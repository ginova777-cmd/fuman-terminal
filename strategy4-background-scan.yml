name: Strategy Background Cache

on:
  schedule:
    # Taiwan time 07:00 and 14:30 on trading days. Retry every 10 minutes until cache is updated.
    - cron: "*/10 23 * * 0-4"
    - cron: "*/10 0-14 * * 1-5"
  workflow_dispatch:
    inputs:
      full_scan:
        description: "Always true: every run scans the full Taiwan stock universe once"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

concurrency:
  group: strategy-background-cache
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Decide retry need
        id: retry
        run: echo "mode=$(node scripts/should-run-scheduled-cache.js strategy4)" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}

      - name: Update strategy caches
        if: steps.retry.outputs.mode == 'run'
        run: |
          RUN_OPEN_BUY="0"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            RUN_OPEN_BUY="1"
          fi
          node scripts/scan-strategy4-cache.js
          if [ "$RUN_OPEN_BUY" = "1" ]; then
            node scripts/scan-open-buy-cache.js
          else
            echo "Skip open-buy for this manual run."
          fi
        env:
          STRATEGY4_CHUNK_SIZE: "80"
          OPEN_BUY_CHUNK_SIZE: "48"
          FULL_SCAN: "1"

      - name: Commit cache
        if: steps.retry.outputs.mode == 'run'
        run: |
          git config user.name "fuman-terminal-bot"
          git config user.email "actions@github.com"
          git add data/strategy4-latest.json data/strategy4-backup.json data/open-buy-latest.json data/open-buy-backup.json
          git diff --cached --quiet || git commit -m "Update strategy caches"
          git pull --rebase origin main
          git push
