<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>輔滿會員登入</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef8f8;
      --grid: rgba(30, 88, 112, .08);
      --text: #152231;
      --muted: #64748b;
      --brand: #0f8f86;
      --brand-2: #0b766e;
      --line: #d4e2ea;
      --input: #e8f1ff;
      --danger: #be123c;
      --soft: #f7fbfd;
      --shadow: 0 28px 80px rgba(15, 35, 50, .16);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
      color: var(--text);
      background:
        linear-gradient(90deg, var(--grid) 1px, transparent 1px) 0 0 / 48px 48px,
        linear-gradient(var(--grid) 1px, transparent 1px) 0 0 / 48px 48px,
        radial-gradient(circle at 18% 10%, rgba(255, 139, 72, .16), transparent 28%),
        radial-gradient(circle at 82% 12%, rgba(20, 184, 166, .22), transparent 34%),
        var(--bg);
    }
    main {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(280px, 1fr) minmax(360px, 520px);
      gap: clamp(28px, 7vw, 100px);
      align-items: center;
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 44px 0 104px;
    }
    .brand-panel {
      display: grid;
      justify-items: center;
      text-align: center;
      gap: 18px;
    }
    .brand-mark {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      padding: 5px;
      background:
        linear-gradient(135deg, #ef4444, #f97316 42%, #0f172a 43%),
        #0f172a;
      box-shadow: 0 16px 40px rgba(15, 23, 42, .24);
    }
    .brand-mark span {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 33% 22%, #dbeafe 0 4px, transparent 5px),
        radial-gradient(circle at 55% 18%, #93c5fd 0 3px, transparent 4px),
        radial-gradient(circle at 66% 34%, #e0f2fe 0 3px, transparent 4px),
        radial-gradient(circle at 38% 62%, rgba(14, 165, 233, .42), transparent 30%),
        #101827;
      border: 1px solid rgba(191, 219, 254, .3);
      color: #fbbf24;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: .04em;
      text-shadow: 0 2px 10px rgba(251, 191, 36, .32);
    }
    h1 {
      margin: 0;
      font-size: clamp(56px, 8vw, 92px);
      line-height: .95;
      letter-spacing: 0;
    }
    .brand-panel p {
      margin: 0;
      color: #008f9a;
      font-size: 24px;
      font-weight: 900;
    }
    .auth-card {
      background: rgba(255, 255, 255, .92);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: var(--shadow);
      padding: 18px 22px 0;
      max-height: min(760px, calc(100vh - 128px));
      overflow: auto;
      scrollbar-width: thin;
    }
    body[data-auth-mode="forgot"] main {
      grid-template-columns: minmax(320px, 344px);
      justify-content: center;
      width: min(100%, calc(100% - 40px));
      padding-top: 86px;
    }
    body[data-auth-mode="forgot"] .brand-panel,
    body[data-auth-mode="forgot"] .auth-tabs,
    body[data-auth-mode="forgot"] #passwordField,
    body[data-auth-mode="forgot"] #guestLogin,
    body[data-auth-mode="forgot"] #googleFallbackNotice {
      display: none;
    }
    body[data-auth-mode="forgot"] .auth-card {
      width: min(344px, 100%);
      padding: 26px 28px 0;
      max-height: none;
      overflow: visible;
    }
    .auth-heading {
      display: none;
      text-align: center;
      margin: 0 0 18px;
    }
    .auth-heading h2 {
      margin: 0;
      color: #007986;
      font-size: 30px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    .auth-heading p {
      margin: 10px 0 0;
      color: #475569;
      font-size: 13px;
      line-height: 1.7;
      font-weight: 800;
    }
    body[data-auth-mode="forgot"] .auth-heading {
      display: block;
    }
    .auth-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }
    .auth-tabs button,
    .auth-form button,
    .quick-action {
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      font: inherit;
      font-weight: 900;
    }
    .auth-tabs button {
      padding: 10px 12px;
      background: #edf4f8;
      color: #52677a;
    }
    .auth-tabs button.active {
      background: var(--brand);
      color: white;
    }
    label {
      display: block;
      color: #0f172a;
      font-weight: 900;
      margin: 0 0 11px;
    }
    .label-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 8px;
    }
    .label-row a {
      color: var(--brand);
      text-decoration: none;
      font-size: 14px;
      font-weight: 900;
    }
    .field {
      display: grid;
      grid-template-columns: 34px 1fr 42px;
      align-items: center;
      gap: 8px;
      background: var(--input);
      border: 1px solid #c8d8eb;
      border-radius: 9px;
      min-height: 58px;
      padding: 0 10px;
    }
    .field input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
      font-weight: 700;
    }
    .field button {
      border: 1px solid #c9d8ea;
      background: rgba(255, 255, 255, .42);
      border-radius: 14px;
      width: 42px;
      height: 42px;
      cursor: pointer;
    }
    .captcha {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 14px;
      min-height: 68px;
      padding: 10px 14px;
      margin: 10px 0 12px;
      background: #fff;
    }
    .captcha-box {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-weight: 800;
    }
    .captcha-box input {
      width: 28px;
      height: 28px;
      accent-color: var(--brand);
    }
    .cloudflare {
      text-align: right;
      font-size: 11px;
      color: #111827;
      font-weight: 900;
    }
    .submit {
      width: 100%;
      min-height: 58px;
      background: var(--brand);
      color: #fff;
      font-size: 24px;
      box-shadow: 0 18px 36px rgba(15, 143, 134, .22);
    }
    .submit:disabled {
      opacity: .62;
      cursor: wait;
    }
    .divider {
      text-align: center;
      margin: 12px 0;
      color: #94a3b8;
      font-size: 18px;
      font-weight: 900;
    }
    .quick-action {
      width: 100%;
      display: grid;
      grid-template-columns: 48px 1fr 24px;
      align-items: center;
      gap: 14px;
      min-height: 66px;
      margin: 10px 0;
      padding: 10px 18px;
      text-align: left;
      text-decoration: none;
    }
    .quick-action.primary {
      background: var(--brand-2);
      color: white;
    }
    .quick-action.secondary {
      background: white;
      color: var(--text);
      border: 1px solid var(--line);
    }
    body[data-auth-mode="forgot"] .quick-action.secondary {
      grid-template-columns: 42px 1fr auto 18px;
      min-height: 52px;
      padding: 8px 12px;
    }
    body[data-auth-mode="forgot"] .quick-action.secondary .quick-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: #e2fbf8;
    }
    .connected-badge {
      display: none;
      width: max-content;
      margin-top: 0;
      border: 1px solid rgba(15, 143, 134, .35);
      border-radius: 999px;
      background: #dff8ee;
      color: var(--brand-2);
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 900;
    }
    body[data-auth-mode="forgot"] .connected-badge {
      display: inline-flex;
    }
    body[data-auth-mode="forgot"] #googleActionNote,
    body[data-auth-mode="forgot"] #status:empty {
      display: none;
    }
    .quick-icon {
      display: grid;
      place-items: center;
      width: 48px;
      height: 48px;
      border-radius: 10px;
      background: rgba(255, 255, 255, .86);
      color: var(--brand-2);
      font-weight: 900;
    }
    .quick-action small {
      display: block;
      margin-top: 4px;
      color: rgba(255, 255, 255, .86);
      font-size: 14px;
    }
    .quick-action.secondary small { color: var(--muted); }
    .status {
      min-height: 22px;
      margin: 12px 0 0;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.5;
    }
    .status.error { color: var(--danger); }
    .status.good { color: var(--brand); }
    .footer-switch {
      border-top: 1px solid var(--line);
      margin: 14px -22px 0;
      padding: 15px 22px;
      text-align: center;
      color: var(--muted);
      font-weight: 800;
    }
    .footer-switch button {
      border: 0;
      background: transparent;
      color: var(--brand);
      cursor: pointer;
      font: inherit;
      font-weight: 900;
    }
    footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 18px;
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
      color: #64748b;
      font-weight: 900;
      letter-spacing: .08em;
      font-size: 13px;
    }
    footer nav {
      display: flex;
      gap: 20px;
      letter-spacing: 0;
    }
    footer a { color: #64748b; text-decoration: none; }
    @media (max-width: 860px) {
      main {
        grid-template-columns: 1fr;
        padding-top: 32px;
      }
      h1 { font-size: 56px; }
      .auth-card { max-height: none; }
      body[data-auth-mode="forgot"] main { padding-top: 32px; }
      footer { position: static; padding: 0 20px 24px; }
    }
  </style>
</head>
<body>
  <main>
    <section class="brand-panel" aria-label="輔滿品牌">
      <div class="brand-mark" aria-hidden="true"><span>輔滿</span></div>
      <h1>Fuman</h1>
      <p>選股小終端</p>
    </section>

    <section class="auth-card" aria-label="會員登入註冊">
      <div class="auth-tabs" role="tablist">
        <button class="active" type="button" data-auth-mode="login">登入</button>
        <button type="button" data-auth-mode="signup">註冊</button>
      </div>
      <header class="auth-heading" id="authHeading">
        <h2 id="authTitle">重設密碼</h2>
        <p id="authDescription">輸入帳號信箱。如果帳號存在，我們會寄出一封限時重設信。</p>
      </header>

      <form id="authForm" class="auth-form" novalidate>
        <label>
          <span class="label-row"><span>電子郵件 / 帳號</span></span>
          <span class="field">
            <span aria-hidden="true">✉</span>
            <input id="email" type="email" autocomplete="email" placeholder="you@example.com" required>
            <span></span>
          </span>
        </label>

        <label id="passwordField">
          <span class="label-row"><span id="passwordLabel">密碼</span><a href="#" id="forgotPassword">忘記密碼？</a></span>
          <span class="field">
            <span aria-hidden="true">▢</span>
            <input id="password" type="password" autocomplete="current-password" placeholder="請輸入密碼" minlength="6" required>
            <button id="togglePassword" type="button" aria-label="顯示或隱藏密碼">◎</button>
          </span>
        </label>

        <div class="captcha" id="captchaPanel" aria-label="人機驗證占位">
          <label class="captcha-box"><input id="captcha" type="checkbox" required>驗證您是人類</label>
          <div class="cloudflare">CLOUDFLARE<br><small>隱私權 · 條款</small></div>
        </div>

        <button id="submitButton" class="submit" type="submit">登入</button>
        <div id="status" class="status" role="status" aria-live="polite">請登入；未開通權限時仍可用訪客模式查看公開市場總覽。</div>
      </form>

      <div class="divider">或</div>

      <a class="quick-action primary" href="/?desktop=1" id="guestLogin">
        <span class="quick-icon">♙</span>
        <span><strong>遊客登入</strong><small>先看今日訊號輪廓</small></span>
        <span>›</span>
      </a>

      <a class="quick-action secondary" id="googleLogin" target="_top" href="https://jxnqyqnigsppqsxinlrq.supabase.co/auth/v1/authorize?provider=google&redirect_to=https%3A%2F%2Ffuman-terminal.vercel.app%2Fauth.html">
        <span class="quick-icon">G</span>
        <span><strong id="googleActionTitle">使用 Google 申請開通</strong><small id="googleActionNote">可用 Google 帳號申請；完成後依會員權限啟用</small></span>
        <span class="connected-badge" id="googleConnectedBadge">已連線</span>
        <span>›</span>
      </a>
      <p class="status good" id="googleFallbackNotice" style="margin:8px 0 0">
        若上方沒有跳轉，請點
        <a id="googleFallbackLink" target="_top" href="https://jxnqyqnigsppqsxinlrq.supabase.co/auth/v1/authorize?provider=google&redirect_to=https%3A%2F%2Ffuman-terminal.vercel.app%2Fauth.html">這裡直接開啟 Google 申請</a>
      </p>
      <div class="footer-switch">
        <span id="switchText">還沒有帳號？</span>
        <button type="button" id="switchMode">立即註冊帳號</button>
      </div>
    </section>
  </main>

  <footer>
    <strong>Fuman © 2026 FUMAN QUANT TERMINAL. ALL RIGHTS RESERVED.</strong>
    <nav><a href="#">服務條款</a><a href="#">隱私權政策</a><a href="#">風險揭露</a><a href="#">聯絡我們</a></nav>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/terminal-runtime-config.js?v=public-terminal-fast-20260630-20"></script>
  <script>
    (() => {
      const AUTH_CACHE_KEY = "fuman-terminal-auth-cache-v1";
      const AUTH_STORAGE_KEY = "sb-jxnqyqnigsppqsxinlrq-auth-token";
      const ALLOWED_STATUSES = new Set(["active", "approved", "admin", "paid", "pro", "premium"]);
      const PRESERVE_STORAGE_KEYS = new Set(["fuman_watchlist", "fuman_mobile_watchlist_v1", AUTH_CACHE_KEY, AUTH_STORAGE_KEY]);
      const config = window.FUMAN_RUNTIME_CONFIG || {};

      function pruneAuthStorage(reason = "auth_quota") {
        try {
          const remove = [];
          for (let index = 0; index < localStorage.length; index += 1) {
            const key = localStorage.key(index) || "";
            if (PRESERVE_STORAGE_KEYS.has(key)) continue;
            if (key.startsWith("sb-") && key.endsWith("-auth-token")) remove.push(key);
            else if (key.includes("terminal") && key.includes("cache")) remove.push(key);
            else if (key.includes("strategy5") && key.includes("cache")) remove.push(key);
            else if (key.includes("market-ai") && key.includes("cache")) remove.push(key);
            else if (key.includes("heatmap") && key.includes("cache")) remove.push(key);
          }
          remove.forEach((key) => localStorage.removeItem(key));
          sessionStorage.setItem("fuman-auth-storage-pruned", JSON.stringify({ at: Date.now(), reason, removed: remove.length }));
        } catch {}
      }

      function safeSetStorage(key, value) {
        try {
          localStorage.setItem(key, value);
        } catch (error) {
          pruneAuthStorage(error?.name || "quota_error");
          localStorage.setItem(key, value);
        }
      }

      const authStorage = {
        getItem: (key) => localStorage.getItem(key),
        removeItem: (key) => localStorage.removeItem(key),
        setItem: (key, value) => safeSetStorage(key, value),
      };
      pruneAuthStorage("auth_page_open");
      const client = config.supabaseUrl && config.supabaseKey && window.supabase
        ? window.supabase.createClient(config.supabaseUrl, config.supabaseKey, {
            auth: {
              storageKey: AUTH_STORAGE_KEY,
              storage: authStorage,
              persistSession: true,
              autoRefreshToken: true,
              detectSessionInUrl: true,
            },
          })
        : null;
      const form = document.querySelector("#authForm");
      const email = document.querySelector("#email");
      const password = document.querySelector("#password");
      const captcha = document.querySelector("#captcha");
      const status = document.querySelector("#status");
      const submit = document.querySelector("#submitButton");
      const authTitle = document.querySelector("#authTitle");
      const authDescription = document.querySelector("#authDescription");
      const passwordLabel = document.querySelector("#passwordLabel");
      const forgotPassword = document.querySelector("#forgotPassword");
      const passwordField = document.querySelector("#passwordField");
      const captchaPanel = document.querySelector("#captchaPanel");
      const tabs = [...document.querySelectorAll("[data-auth-mode]")];
      const switchText = document.querySelector("#switchText");
      const switchMode = document.querySelector("#switchMode");
      const googleActionTitle = document.querySelector("#googleActionTitle");
      const googleActionNote = document.querySelector("#googleActionNote");
      const authParams = new URLSearchParams(location.search);
      const nextUrl = authParams.get("next") || "/?desktop=1";
      let mode = "login";

      function setStatus(message, type = "") {
        status.textContent = message;
        status.className = `status ${type}`.trim();
      }

      function isPasswordRecoveryUrl() {
        const hash = new URLSearchParams(String(location.hash || "").replace(/^#/, ""));
        return authParams.get("type") === "recovery" || hash.get("type") === "recovery";
      }

      function applyMode(next) {
        mode = next;
        document.body.dataset.authMode = mode;
        tabs.forEach((tab) => tab.classList.toggle("active", tab.dataset.authMode === mode));
        const resetMode = mode === "reset";
        const forgotMode = mode === "forgot";
        submit.textContent = resetMode ? "更新密碼" : forgotMode ? "寄出重設信" : mode === "signup" ? "註冊" : "登入";
        switchText.textContent = resetMode || forgotMode ? "想起密碼了？" : mode === "signup" ? "已經有帳號？" : "還沒有帳號？";
        switchMode.textContent = resetMode || forgotMode ? "回到登入" : mode === "signup" ? "立即登入" : "立即註冊帳號";
        email.placeholder = forgotMode ? "name@company.com" : "you@example.com";
        passwordLabel.textContent = resetMode ? "新密碼" : "密碼";
        password.placeholder = resetMode ? "請輸入新密碼" : "請輸入密碼";
        password.autocomplete = resetMode || mode === "signup" ? "new-password" : "current-password";
        forgotPassword.hidden = resetMode || forgotMode;
        email.required = !resetMode;
        password.required = !resetMode && !forgotMode;
        if (passwordField) passwordField.hidden = forgotMode;
        captcha.required = !resetMode;
        captchaPanel.hidden = resetMode;
        if (authTitle) authTitle.textContent = resetMode ? "更新密碼" : "重設密碼";
        if (authDescription) {
          authDescription.textContent = resetMode
            ? "請輸入新密碼。更新完成後會自動導回終端。"
            : "輸入帳號信箱。如果帳號存在，我們會寄出一封限時重設信。";
        }
        if (googleActionTitle) googleActionTitle.textContent = forgotMode ? "使用 Google 登入" : "使用 Google 申請開通";
        if (googleActionNote) googleActionNote.textContent = forgotMode ? "可用 Google 帳號直接登入" : "可用 Google 帳號申請；完成後依會員權限啟用";
        setStatus(forgotMode ? "" : resetMode
          ? "請輸入新密碼，送出後會更新帳號密碼並回到終端。"
          : mode === "signup" ? "註冊後需開通權限，才會解鎖策略與成績單。" : "請登入；未開通權限時仍可用訪客模式查看公開市場總覽。");
      }

      async function sendPasswordResetEmail() {
        if (!client) return setStatus("登入服務尚未載入，請重新整理後再試。", "error");
        if (!email.value.trim()) return setStatus("請先輸入 Email。", "error");
        if (!captcha.checked) return setStatus("請先完成您是人類的驗證。", "error");
        const redirect = new URL("/auth.html", location.origin);
        redirect.searchParams.set("next", nextUrl || "/?desktop=1");
        const result = await client.auth.resetPasswordForEmail(email.value.trim(), { redirectTo: redirect.toString() });
        setStatus(result.error ? result.error.message : "重設密碼信已送出，請到信箱確認。", result.error ? "error" : "good");
      }

      async function readAccess(session) {
        const user = session?.user;
        if (!user) return { status: "anonymous", allowed: false };
        if ((config.adminEmails || []).map((item) => String(item).toLowerCase()).includes(String(user.email || "").toLowerCase())) {
          return { status: "admin", allowed: true, source: "admin_email" };
        }
        if (!client) return { status: "auth_client_missing", allowed: false };
        try {
          const table = config.accessTable || "fuman_user_access";
          const byUser = await client.from(table).select("*").eq("user_id", user.id).maybeSingle();
          let row = byUser.data;
          if (!row && user.email) {
            const byEmail = await client.from(table).select("*").eq("email", user.email).maybeSingle();
            row = byEmail.data;
          }
          const rawStatus = String(row?.status || row?.plan_status || row?.member_status || "").toLowerCase();
          const rawPlan = String(row?.plan || row?.plan_code || row?.tier || "").toLowerCase();
          const allowed = row?.allowed === true || ALLOWED_STATUSES.has(rawStatus) || ALLOWED_STATUSES.has(rawPlan);
          return { ...(row || {}), status: rawStatus || "pending", plan: rawPlan, allowed, source: row ? table : "missing_access_row" };
        } catch (error) {
          return { status: "access_check_error", allowed: false, error: error?.message || String(error) };
        }
      }

      function isAlreadyRegisteredError(error) {
        return /already registered|already exists|user.*registered|user.*exists/i.test(String(error?.message || error || ""));
      }

      async function persistSession(session) {
        const access = await readAccess(session);
        writeSessionCache(session, access);
        return access;
      }

      function writeSessionCache(session, access) {
        const statusValue = access.allowed ? (access.status || "active") : (access.status || "pending");
        safeSetStorage(AUTH_CACHE_KEY, JSON.stringify({
          at: Date.now(),
          status: statusValue,
          email: session?.user?.email || "",
          userId: session?.user?.id || "",
          accessToken: session?.access_token || "",
          expiresAt: session?.expires_at || 0,
          allowed: access.allowed === true,
          access
        }));
      }

      function persistSessionFast(session, source) {
        const access = { status: "checking", allowed: false, source: source || "auth_fast_redirect" };
        writeSessionCache(session, access);
        window.setTimeout(() => {
          readAccess(session).then((nextAccess) => writeSessionCache(session, nextAccess)).catch(() => {});
        }, 0);
        return access;
      }

      function shouldFastRedirectAfterAuth() {
        try {
          const next = new URL(nextUrl || "/?desktop=1", location.origin);
          return next.origin === location.origin && next.pathname === "/mobile";
        } catch {
          return nextUrl === "/mobile";
        }
      }

      function redirectAfterAuth() {
        location.replace(nextUrl || "/?desktop=1");
      }

      function googleAuthorizeUrl() {
        const redirect = new URL("/auth.html", location.origin);
        if (nextUrl && nextUrl !== "/?desktop=1") redirect.searchParams.set("next", nextUrl);
        const url = new URL("https://jxnqyqnigsppqsxinlrq.supabase.co/auth/v1/authorize");
        url.searchParams.set("provider", "google");
        url.searchParams.set("redirect_to", redirect.toString());
        return url.toString();
      }

      async function finishOAuthRedirect() {
        if (isPasswordRecoveryUrl()) return;
        if (!client) return;
        const params = new URLSearchParams(location.search);
        const hash = new URLSearchParams(String(location.hash || "").replace(/^#/, ""));
        const errorMessage = params.get("error_description") || hash.get("error_description") || params.get("error") || hash.get("error");
        if (errorMessage) {
          setStatus("Google 登入未完成：" + errorMessage, "error");
          return;
        }
        const code = params.get("code");
        const hasTokenHash = hash.has("access_token") || hash.has("refresh_token");
        if (!code && !hasTokenHash) return;
        setStatus("正在完成 Google 登入...");
        try {
          if (code && client.auth.exchangeCodeForSession) {
            const exchanged = await client.auth.exchangeCodeForSession(code);
            if (exchanged.error) throw exchanged.error;
          }
          const session = (await client.auth.getSession()).data?.session;
          if (!session) throw new Error("Google 已回來，但沒有取得登入 session");
          const cleanUrl = new URL(location.href);
          cleanUrl.searchParams.delete("code");
          cleanUrl.searchParams.delete("error");
          cleanUrl.searchParams.delete("error_description");
          cleanUrl.hash = "";
          history.replaceState({}, document.title, cleanUrl.pathname + cleanUrl.search);
          if (shouldFastRedirectAfterAuth()) {
            persistSessionFast(session, "google_mobile_fast_redirect");
            setStatus("Google 登入成功，正在進入手機版...", "good");
            redirectAfterAuth();
            return;
          }
          const access = await persistSession(session);
          if (access.allowed) {
            setStatus("Google 登入成功，正在進入終端...", "good");
            redirectAfterAuth();
            return;
          }
          setStatus("Google 登入成功，但尚未開通策略權限。請等待管理員開通。", "good");
        } catch (error) {
          setStatus(error?.message || "Google 登入回傳處理失敗。", "error");
        }
      }

      async function finishPasswordLogin(credentials, message = "登入中...") {
        setStatus(message);
        const result = await client.auth.signInWithPassword(credentials);
        if (result.error) throw result.error;
        const session = result.data?.session || (await client.auth.getSession()).data?.session;
        if (!session) throw new Error("登入成功但沒有取得 session，請重新整理後再試。");
        if (shouldFastRedirectAfterAuth()) {
          persistSessionFast(session, "password_mobile_fast_redirect");
          setStatus("登入成功，正在進入手機版...", "good");
          redirectAfterAuth();
          return;
        }
        const access = await persistSession(session);
        if (access.allowed) {
          setStatus("登入成功，會員權限已開通，正在進入終端。", "good");
        } else {
          setStatus("登入成功，正在進入終端；策略內容會先以會員罩顯示，開通後自動解鎖。", "good");
        }
        redirectAfterAuth();
      }

      async function finishSignupSession(session) {
        if (!session) throw new Error("註冊完成但沒有取得 session，請重新登入。");
        if (shouldFastRedirectAfterAuth()) {
          persistSessionFast(session, "signup_mobile_fast_redirect");
          safeSetStorage("fuman-mobile-member-notice-v1", "註冊成功，請聯繫作者開通權限");
          setStatus("註冊完成，請聯繫作者開通權限。", "good");
          redirectAfterAuth();
          return;
        }
        const access = await persistSession(session);
        setStatus(access.allowed ? "註冊完成，會員權限已開通，正在進入終端。" : "註冊完成，請聯繫作者開通權限。", "good");
        redirectAfterAuth();
      }

      async function finishPasswordRecovery() {
        if (!client) return setStatus("登入服務尚未載入，請重新整理後再試。", "error");
        let session = (await client.auth.getSession()).data?.session;
        const recoveryCode = new URLSearchParams(location.search).get("code");
        if (!session && recoveryCode && client.auth.exchangeCodeForSession) {
          const exchanged = await client.auth.exchangeCodeForSession(recoveryCode);
          if (exchanged.error) throw exchanged.error;
          session = exchanged.data?.session || (await client.auth.getSession()).data?.session;
        }
        if (!session) return setStatus("重設密碼連結已失效，請重新點忘記密碼取得新連結。", "error");
        if (!password.value || password.value.length < 6) return setStatus("新密碼至少需要 6 個字元。", "error");
        setStatus("正在更新密碼...");
        const result = await client.auth.updateUser({ password: password.value });
        if (result.error) throw result.error;
        const nextSession = (await client.auth.getSession()).data?.session || session;
        const cleanUrl = new URL(location.href);
        cleanUrl.searchParams.delete("code");
        cleanUrl.searchParams.delete("type");
        cleanUrl.searchParams.delete("error");
        cleanUrl.searchParams.delete("error_description");
        cleanUrl.hash = "";
        history.replaceState({}, document.title, cleanUrl.pathname + cleanUrl.search);
        if (shouldFastRedirectAfterAuth()) {
          persistSessionFast(nextSession, "recovery_mobile_fast_redirect");
          setStatus("密碼更新完成，正在進入手機版...", "good");
          redirectAfterAuth();
          return;
        }
        const access = await persistSession(nextSession);
        setStatus(access.allowed ? "密碼已更新，正在進入終端。" : "密碼已更新，正在進入終端；權限開通後會自動解鎖。", "good");
        redirectAfterAuth();
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!client) return setStatus("登入服務尚未載入，請重新整理後再試。", "error");
        if (mode === "reset") {
          submit.disabled = true;
          try {
            await finishPasswordRecovery();
          } catch (error) {
            setStatus(error?.message || "密碼更新失敗，請重新取得忘記密碼連結。", "error");
          } finally {
            submit.disabled = false;
          }
          return;
        }
        if (mode === "forgot") {
          submit.disabled = true;
          setStatus("正在寄出重設密碼信...");
          try {
            await sendPasswordResetEmail();
          } catch (error) {
            setStatus(error?.message || "重設密碼信寄送失敗，請稍後再試。", "error");
          } finally {
            submit.disabled = false;
          }
          return;
        }
        if (!email.value.trim()) return setStatus("請先輸入 Email。", "error");
        if (!password.value || password.value.length < 6) return setStatus("密碼至少需要 6 個字元。", "error");
        if (!captcha.checked) return setStatus("請先完成您是人類的驗證。", "error");
        submit.disabled = true;
        setStatus(mode === "signup" ? "註冊中..." : "登入中...");
        try {
          const credentials = { email: email.value.trim(), password: password.value };
          if (mode === "signup") {
            const result = await client.auth.signUp(credentials);
            if (result.error) {
              if (isAlreadyRegisteredError(result.error)) {
                await finishPasswordLogin(credentials, "帳號已存在，正在自動登入並進入終端...");
                return;
              }
              throw result.error;
            }
            const session = result.data?.session || (await client.auth.getSession()).data?.session;
            if (!session) {
              setStatus("註冊完成，請先完成 Email 驗證；權限開通後即可解鎖策略與成績單。", "good");
              return;
            }
            await finishSignupSession(session);
            return;
          }
          await finishPasswordLogin(credentials);
        } catch (error) {
          if (mode === "signup" && isAlreadyRegisteredError(error)) {
            applyMode("login");
            setStatus("此 Email 已註冊，請直接登入；若密碼相同會自動進入終端。", "error");
          } else {
            setStatus(error?.message || "登入失敗，請確認帳號密碼。", "error");
          }
        } finally {
          submit.disabled = false;
        }
      });
      tabs.forEach((tab) => tab.addEventListener("click", () => applyMode(tab.dataset.authMode)));
      switchMode.addEventListener("click", () => applyMode(mode === "login" ? "signup" : "login"));
      document.querySelector("#togglePassword").addEventListener("click", () => {
        password.type = password.type === "password" ? "text" : "password";
      });
      document.querySelector("#forgotPassword").addEventListener("click", async (event) => {
        event.preventDefault();
        applyMode("forgot");
      });
      document.querySelector("#googleLogin").addEventListener("click", (event) => {
        event.preventDefault();
        const href = googleAuthorizeUrl();
        setStatus("正在開啟 Google 帳號申請...");
        window.setTimeout(() => {
          if (window.top && window.top !== window) window.top.location.href = href;
          else window.location.href = href;
        }, 80);
      });
      document.querySelector("#googleLogin").href = googleAuthorizeUrl();
      document.querySelector("#googleFallbackLink").href = googleAuthorizeUrl();
      applyMode(isPasswordRecoveryUrl() ? "reset" : authParams.get("mode") === "signup" ? "signup" : authParams.get("mode") === "forgot" ? "forgot" : "login");
      void finishOAuthRedirect();
    })();
  </script>
</body>
