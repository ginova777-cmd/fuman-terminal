<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>輔滿極速手機版</title><link rel="preload" href="/api/mobile-boot" as="fetch"><style>:root{color-scheme:dark;--bg:#070a12;--panel:#101623;--line:#223047;--text:#edf3ff;--muted:#91a0b8;--blue:#74a7ff}html[data-sun="1"]{color-scheme:light;--bg:#f7f9ff;--panel:#fff;--line:#cbd6e6;--text:#142033;--muted:#5b6b82;--blue:#1763c7}
    *{box-sizing:border-box}

    [hidden]{display:none!important}
