      toast(`${code} 不是有效台股代號`);
      return false;
    }
    const next = writeList([{ code, name: stock.name, market: stock.market, reason: options.reason || "手機自選股新增", addedAt: new Date().toISOString() }, ...rows]);
    const message = `${code} ${stock.name} 已加入自選`;
    render ? renderWatch(message) : setShellCount(next);
    toast(`+自選 ${code}`);
    return true;
  }
  function rowReason(button) {
    return (button?.closest(".market-ai-stock-row,.mobile-terminal-row,.watch-row")?.innerText || "手機策略卡加入").replace(/\s+/g, " ").slice(0, 220);
  }
  function closestFromEvent(event, selector) {
    for (const node of event.composedPath?.() || []) {
      if (node?.matches?.(selector)) return node;
    }
    return event.target?.closest?.(selector) || null;
  }
  async function recoverPendingAdd(code, options = {}) {
    if (!code || readList().some((row) => String(row.code) === code)) return true;
    let stock = null;
    try {
      stock = await lookupMeta(code);
    } catch {}
    if (!stock && options.name && String(options.name).trim() !== code) {
      stock = { code, name: String(options.name).trim(), market: "mobile-strategy" };
    }
    if (stock === null) {
      const message = `${code} 不是有效上市/上櫃台股代號`;
      if (options.render || watchTabActive()) renderWatch(message);
      else lastMessage = message;
      toast(`${code} 不是有效台股代號`);
      return false;
    }
    if (!stock) return false;
    const next = writeList([{ code, name: stock.name, market: stock.market, reason: options.reason || "手機自選股新增", addedAt: new Date().toISOString() }, ...readList()]);
    const message = `${code} ${stock.name} 已加入自選`;
    if (options.button) {
      options.button.disabled = Boolean(options.disableButton);
      if (options.disableButton) {
        options.button.textContent = "已加入自選";
        options.button.dataset.watchAdded = "1";
      }
    }
    if (options.render || watchTabActive()) renderWatch(message);
    else {
      lastMessage = message;
      setShellCount(next);
    }
    toast(`+自選 ${code}`);
    return true;
  }
  function scheduleAddRecovery(code, options = {}) {
    for (const ms of [2400, 5200, 8200]) {
      setTimeout(() => {
        const stuckText = [
          document.querySelector("#mobile-watch-status")?.textContent || "",
          document.querySelector("#status")?.textContent || "",
          options.button?.textContent || "",
        ].join(" ");
        if (readList().some((row) => String(row.code) === code)) return;
        if (options.fromStrategy && options.button && !document.body.contains(options.button)) return;
        if (/不是有效|已達 10/.test(stuckText)) return;
        recoverPendingAdd(code, options).catch(() => {});
      }, ms);
    }
  }
  function recoverStuckConfirmingStatus() {
    if (!watchTabActive()) return;
    const status = String(document.querySelector("#mobile-watch-status")?.textContent || "");
    if (!/正在確認台股代號/.test(status)) return;
    const code = code4(status) || code4(document.querySelector("#mobile-watch-input")?.value);
    if (!code || readList().some((row) => String(row.code) === code)) return;
    recoverPendingAdd(code, { reason: "手機手動新增", render: true }).catch(() => {});
  }
  setInterval(recoverStuckConfirmingStatus, 1800);
  window.addEventListener("click", (event) => {
    const watchTab = closestFromEvent(event, '#tabs button[data-fragment="watch"]');
    if (watchTab) {
      setTimeout(() => renderWatch(lastMessage), 0);
      return;
    }
    const removeButton = closestFromEvent(event, "[data-watch-remove]");
    if (removeButton) {
      event.preventDefault();
      event.stopPropagation();
      event.stopImmediatePropagation();
      const code = code4(removeButton.dataset.watchRemove);
      writeList(readList().filter((row) => String(row.code) !== code));
      renderWatch(`${code} 已移除`);
      toast(`已移除 ${code}`);
      return;
    }
    const manualButton = closestFromEvent(event, "[data-mobile-watch-add]");
    if (manualButton) {
      event.preventDefault();
      event.stopPropagation();
      event.stopImmediatePropagation();
      const input = document.querySelector("#mobile-watch-input");
      const code = code4(input?.value);
      if (code) scheduleAddRecovery(code, { button: manualButton, reason: "手機手動新增", render: true });
      addStock(input?.value, { button: manualButton, reason: "手機手動新增", render: true }).then((ok) => {
        const nextInput = document.querySelector("#mobile-watch-input");
        if (ok && nextInput && !nextInput.disabled) nextInput.value = "";
      }).catch(() => {
        if (manualButton) manualButton.disabled = false;
        renderWatch("新增流程逾時，請再按一次新增");
      });
      return;
    }
    const strategyButton = closestFromEvent(event, "[data-ai-watch-code]");
    if (strategyButton) {
      event.preventDefault();
      event.stopPropagation();
      event.stopImmediatePropagation();
      const oldText = strategyButton.textContent || "加入自選";
      strategyButton.textContent = "加入中";
      const code = code4(strategyButton.dataset.aiWatchCode);
      if (code) {
        scheduleAddRecovery(code, {
          button: strategyButton,
          name: strategyButton.dataset.aiWatchName,
          reason: rowReason(strategyButton),
          render: false,
          disableButton: true,
          fromStrategy: true,
        });
      }
      addStock(strategyButton.dataset.aiWatchCode, {
        button: strategyButton,
        name: strategyButton.dataset.aiWatchName,
        reason: rowReason(strategyButton),
        render: false,
      }).then((ok) => {
        strategyButton.textContent = ok ? "已加入自選" : oldText;
        strategyButton.disabled = Boolean(ok);
        strategyButton.dataset.watchAdded = ok ? "1" : "0";
      }).catch(() => {
        strategyButton.disabled = false;
        strategyButton.textContent = oldText;
        if (document.querySelector('#tabs button[data-fragment="watch"]')?.classList.contains("active")) renderWatch("新增流程逾時，請再按一次新增");
      });
    }
  }, true);
  window.addEventListener("keydown", (event) => {
    const input = closestFromEvent(event, "#mobile-watch-input");
    if (!input || event.key !== "Enter") return;
    event.preventDefault();
    event.stopPropagation();
    event.stopImmediatePropagation();
    const code = code4(input.value);
    if (code) scheduleAddRecovery(code, { button: document.querySelector("[data-mobile-watch-add]"), reason: "手機手動新增", render: true });
    addStock(input.value, { button: document.querySelector("[data-mobile-watch-add]"), reason: "手機手動新增", render: true }).then((ok) => {
      const nextInput = document.querySelector("#mobile-watch-input");
      if (ok && nextInput && !nextInput.disabled) nextInput.value = "";
    }).catch(() => {
      renderWatch("新增流程逾時，請再按一次新增");
    });
  }, true);
  new MutationObserver(ensureV2WatchRender).observe(document.querySelector("#content") || document.body, { childList: true });
  self.FUMAN_MOBILE_MANUAL_WATCH_ADD = (rawCode, button) => addStock(rawCode, { button, reason: "手機手動新增", render: true });
  self.FUMAN_MOBILE_MANUAL_WATCH_ADD_V2 = addStock;
  self.FUMAN_MOBILE_WATCH_ADD_RECOVERY = "mobile-watch-v2-add-recovery-20260628-01";
  self.FUMAN_MOBILE_WATCH_STUCK_STATUS_RECOVERY = "mobile-watch-v2-stuck-status-recovery-20260628-01";
})();
</script><script data-mobile-tab-loader="mobile-tab-request-lock-20260628-01">
(() => {
  const tabs = document.querySelector("#tabs");
  const content = document.querySelector("#content");
  if (!tabs || !content) return;
  let requestId = 0;
  const code = (value) => String(value || "").replace(/[^\w-]/g, "");
  const jsonpHtml = (url) => new Promise((resolve, reject) => {
    const callback = `__fm_tab_${Date.now()}_${Math.random().toString(36).slice(2)}`;
    const script = document.createElement("script");
    const cleanup = () => {
      delete self[callback];
      script.remove();
    };
    self[callback] = (payload) => {
      cleanup();
      resolve(payload?.html || "");
    };
    script.onerror = () => {
      cleanup();
      reject(Error("mobile tab jsonp failed"));
    };
    script.src = `${url}${url.includes("?") ? "&" : "?"}callback=${callback}`;
    document.head.appendChild(script);
  });
  const fetchHtml = async (tab) => {
    const url = `/api/mobile-fragment?tab=${encodeURIComponent(tab)}&v=${Date.now()}`;
    if (!self.fetch) return jsonpHtml(url);
    const response = await fetch(url, { cache: "no-store", headers: { "Cache-Control": "no-cache" } });
    if (!response.ok) throw Error(`HTTP ${response.status}`);
    return response.text();
  };
  window.addEventListener("click", (event) => {
    const button = event.target.closest?.("#tabs button[data-fragment]");
    if (!button) return;
    const tab = code(button.dataset.fragment);
    if (!tab || tab === "watch") return;
    event.preventDefault();
    event.stopPropagation();
    event.stopImmediatePropagation();
    const current = ++requestId;
    tabs.querySelectorAll("button").forEach((item) => item.classList.toggle("active", item === button));
    content.innerHTML = `<div class="empty-state" data-mobile-tab-loading="${tab}">載入中。</div>`;
    fetchHtml(tab).then((html) => {
      if (current !== requestId) return;
      content.innerHTML = html || '<div class="empty-state">等待最新 complete run。</div>';
    }).catch(() => {
      if (current !== requestId) return;
      content.innerHTML = '<div class="empty-state">暫時無法取得，請重新整理。</div>';
    });
  }, true);
  self.FUMAN_MOBILE_TAB_REQUEST_LOCK = "mobile-tab-request-lock-20260628-01";
})();
</script><script data-mobile-watch-rescue="mobile-watch-v2-rescue-render-20260628-01">
(() => {
  const HOTFIX = "mobile-watch-v2-direct-render-20260628-04";
  const KEY = "fuman_watchlist";
  const MOBILE_KEY = "fuman_mobile_watchlist_v1";
  let rescueRows = [];
  let pending = null;
  const code4 = (value) => String(value || "").match(/\d{4}/)?.[0] || "";
  const esc = (value) => String(value ?? "").replace(/[&<>"']/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[ch]);
  const closest = (event, selector) => {
    for (const node of event.composedPath?.() || []) {
      if (node?.matches?.(selector)) return node;
    }
    return event.target?.closest?.(selector) || null;
  };
  const readStorageRows = () => {
    try {
      const rows = JSON.parse(localStorage.getItem(KEY) || localStorage.getItem(MOBILE_KEY) || "[]");
      return Array.isArray(rows) ? rows : [];
    } catch {
      return [];
    }
  };
  const domRows = () => [...document.querySelectorAll("#content .watch-row")].map((row) => {
    const text = String(row.textContent || "");
    const code = code4(text);
    const name = text.replace(code, "").replace(/移除.*/g, "").trim() || code;
    return code ? { code, name, reason: "手機自選股新增" } : null;
  }).filter(Boolean);
  const uniqueRows = (...groups) => {
    const out = [];
    const seen = new Set();
    for (const row of groups.flat()) {
      const code = code4(row?.code || row?.symbol || row);
      if (!code || seen.has(code)) continue;
      seen.add(code);
      out.push({ ...row, code, name: String(row?.name || row?.Name || code).trim(), reason: String(row?.reason || "手機自選股新增") });
      if (out.length >= 10) break;
    }
    return out;
  };
  const writeRows = (rows) => {
    const value = JSON.stringify(rows);
    try { localStorage.setItem(KEY, value); } catch {}
    try { localStorage.setItem(MOBILE_KEY, value); } catch {}
  };
  const watchActive = () => document.querySelector('#tabs button[data-fragment="watch"]')?.classList.contains("active")
    || document.querySelector('#content [data-mobile-fragment-key="watch"]');
  const render = (rows, message) => {
    const content = document.querySelector("#content");
    const status = document.querySelector("#status");
    if (!content) return;
    const atLimit = rows.length >= 10;
    if (status) {
      status.dataset.freshness = "fresh";
      status.textContent = `自選 ${rows.length}`;
    }
    const form = `<article class="mobile-terminal-head"><strong>自選</strong><p>${atLimit ? "已達 10 檔上限" : "輸入四碼台股代號新增"}</p><div class="watch-add"><input id="mobile-watch-input" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="${atLimit ? "已達上限" : "股票代碼"}" ${atLimit ? "disabled" : ""}><button type="button" data-mobile-watch-add ${atLimit ? "disabled" : ""}>新增</button></div><div class="watch-status" id="mobile-watch-status">${esc(message || "")}</div></article>`;
    const list = rows.length
      ? `<section class="mobile-terminal-list">${rows.map((row) => `<article class="watch-row"><div><h4>${esc(row.code)} ${esc(row.name)}</h4><small>${esc(row.reason || row.addedAt || "")}</small></div><button type="button" data-watch-remove="${esc(row.code)}">移除</button></article>`).join("")}</section>`
      : '<div class="empty-state">尚未加入。</div>';
    content.innerHTML = `<section class="mobile-terminal-fragment" data-mobile-terminal-fragment="1" data-mobile-fragment-key="watch" data-mobile-watch-hotfix="${HOTFIX}">${form}${list}</section>`;
  };
  const successVisible = (code) => {
    const text = [
      document.querySelector("#mobile-watch-status")?.textContent || "",
      document.querySelector("#status")?.textContent || "",
      pending?.button?.textContent || "",
    ].join(" ");
    if (new RegExp(`${code}.*不是有效|不是有效.*${code}`).test(text)) return false;
    return /已加入自選|已在自選股|已加入/.test(text) || pending?.button?.dataset?.watchAdded === "1";
  };
  const nameFromSuccess = (code) => {
    const text = String(document.querySelector("#mobile-watch-status")?.textContent || "");
    const match = text.match(new RegExp(`${code}\\s+([^\\s]+)\\s+已加入`));
    return match?.[1] || "";
  };
  const ensureCard = () => {
    if (!pending?.code || !successVisible(pending.code)) return;
    const existing = uniqueRows(readStorageRows(), rescueRows, domRows());
    const already = existing.some((row) => row.code === pending.code);
    const name = pending.name || nameFromSuccess(pending.code) || pending.code;
    const rows = uniqueRows(already ? existing : [{ code: pending.code, name, reason: pending.reason || "手機自選股新增", addedAt: new Date().toISOString() }, ...existing]);
    rescueRows = rows;
    writeRows(rows);
    if (watchActive() && !document.querySelector("#content .watch-row")) {
      render(rows, `${pending.code} ${name} 已加入自選`);
    }
  };
  window.addEventListener("click", (event) => {
    const manual = closest(event, "[data-mobile-watch-add]");
    const strategy = closest(event, "[data-ai-watch-code]");
    if (!manual && !strategy) return;
    const input = document.querySelector("#mobile-watch-input");
    const code = code4(strategy?.dataset?.aiWatchCode || input?.value);
    if (!code) return;
    pending = {
      code,
      name: String(strategy?.dataset?.aiWatchName || "").trim(),
      reason: strategy ? "手機策略卡加入" : "手機手動新增",
      button: strategy || manual,
    };
    for (const ms of [900, 1800, 3600, 5600]) setTimeout(ensureCard, ms);
  }, true);
  self.FUMAN_MOBILE_WATCH_RESCUE_RENDER = "mobile-watch-v2-rescue-render-20260628-01";
})();
</script></body></html>
