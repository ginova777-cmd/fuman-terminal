name: Schedule Patrol

on:
  schedule:
    # Taiwan daytime patrol every 10 minutes on trading days.
    - cron: "*/10 0-14 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: schedule-patrol
  cancel-in-progress: false

jobs:
  patrol:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Patrol workflows and caches
        run: node scripts/patrol-schedules.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
