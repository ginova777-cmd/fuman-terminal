<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ŕ╝öŠ╗┐ŠłÉšŞżňľ«</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f14;
      --panel: #141a22;
      --panel-2: #101720;
      --head: #111720;
      --line: #27313f;
      --text: #f3f7fb;
      --muted: #94a3b8;
      --good: #5ee0a0;
      --bad: #ff7a90;
      --brand: #ff9b45;
      --soft: #1d2633;
      --button-text: #17100a;
    }
    body[data-theme="sun"] {
      color-scheme: light;
      --bg: #f6f8fb;
      --panel: #ffffff;
      --panel-2: #f1f5f9;
      --head: #eef3f8;
      --line: #cbd5e1;
      --text: #172033;
      --muted: #64748b;
      --good: #047857;
      --bad: #be123c;
      --brand: #d97706;
      --soft: #e8eef6;
      --button-text: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft JhengHei", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    main {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 22px 16px 42px;
    }
    .top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }
    .badge {
      color: var(--brand);
      font-weight: 800;
      letter-spacing: .08em;
      font-size: 12px;
    }
    h1 {
      margin: 6px 0 8px;
      font-size: clamp(28px, 5vw, 48px);
      letter-spacing: 0;
    }
    p { margin: 0; color: var(--muted); }
    button, input { font: inherit; }
    .tools {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }
    .tools input,
    .tools select {
      width: min(280px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .tools select {
      width: min(180px, 100%);
      cursor: pointer;
    }
    .tools button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: var(--button-text);
      font-weight: 800;
      padding: 10px 14px;
      cursor: pointer;
    }
    .tools .ghost {
      background: var(--soft);
      border: 1px solid var(--line);
      color: var(--text);
    }
    #themeToggle {
      color: #facc15;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 16px 0;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      min-width: 0;
    }
    .card span {
      display: block;
      color: var(--muted);
      font-size: 13px;
    }
    .card strong {
      display: block;
      font-size: 26px;
      margin-top: 8px;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }
    .summary,
    .basis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin: 0 0 14px;
    }
    .basis .card strong {
      font-size: 18px;
      line-height: 1.35;
    }
    .tabs,
    .result-pills {
      display: flex;
      gap: 8px;
      overflow: auto;
      margin: 14px 0;
      padding-bottom: 2px;
    }
    .tab,
    .pill {
      background: var(--soft);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 8px;
      padding: 9px 12px;
      white-space: nowrap;
      cursor: pointer;
    }
    .tab.active,
    .pill.active {
      border-color: var(--brand);
      color: var(--brand);
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .table-wrap {
      overflow: auto;
      max-height: 68vh;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1280px;
    }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      white-space: nowrap;
    }
    th {
      position: sticky;
      top: 0;
      background: var(--head);
      color: var(--text);
      z-index: 1;
    }
    td.reason {
      white-space: normal;
      min-width: 260px;
      color: var(--muted);
    }
    td.rule-group {
      white-space: normal;
      min-width: 150px;
      font-weight: 800;
      color: var(--text);
    }
    td.rule-tags {
      white-space: normal;
      min-width: 220px;
    }
    td.followup {
      white-space: normal;
      min-width: 150px;
      color: var(--muted);
    }
    .tag {
      display: inline-block;
      margin: 0 4px 4px 0;
      padding: 3px 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--soft);
      color: var(--text);
      font-size: 12px;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }
    .followup strong {
      color: var(--good);
      font-weight: 800;
    }
    .good { color: var(--good); font-weight: 800; }
    .bad { color: var(--bad); font-weight: 800; }
    .empty {
      padding: 28px;
      text-align: center;
      color: var(--muted);
    }
    .footer {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
    }
    .status-line {
      margin: 10px 0 0;
      padding: 9px 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }
    .status-line.complete {
      border-color: rgba(94, 224, 160, .45);
      color: var(--good);
    }
    .status-line.degraded,
    .status-line.stale,
    .status-line.blocked {
      border-color: rgba(255, 122, 144, .55);
      color: var(--bad);
    }
    @media (max-width: 760px) {
      main { padding: 16px 10px 32px; }
      .top { display: block; }
      .tools {
        margin-top: 14px;
        justify-content: stretch;
      }
      .tools input,
      .tools select,
      .tools button {
        width: 100%;
      }
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .card strong {
        font-size: 22px;
      }
      table { min-width: 1180px; }
      th, td { padding: 9px 10px; }
    }
  </style>
</head>
<body>
<main>
  <section class="top" data-testid="scorecard-hero">
    <div>
      <div class="badge">FUMAN SCORECARD</div>
      <h1>Ŕ╝öŠ╗┐ŠłÉšŞżňľ«</h1>
      <p id="subtitle">ŠşúňťĘŔ«ÇňĆľňůČÚľőŠłÉšŞżňľ«Ŕ│çŠľÖ...</p>
    </div>
    <div class="tools">
      <select id="historyDate" aria-label="ÚüŞŠôçŠşĚňĆ▓ŠłÉšŞżňľ«ŠŚąŠťč" data-testid="scorecard-history-date">
        <option value="">ŠťÇŠľ░ŠŚąŠťč</option>
      </select>
      <input id="search" type="search" placeholder="ŠÉťň░őń╗úŔÖč / ňÉŹšĘ▒" aria-label="ŠÉťň░őń╗úŔÖčŠłľňÉŹšĘ▒">
      <button id="themeToggle" class="ghost" type="button" data-testid="scorecard-theme-toggle" aria-pressed="false" aria-label="ňłçŠĆŤŔç│ÚÖŻňůëŠĘíň╝Ć" title="ňłçŠĆŤŔç│ÚÖŻňůëŠĘíň╝Ć">ÔśÇ</button>
      <button id="reload" type="button">ÚçŹŠľ░ŠĽ┤šÉć</button>
    </div>
  </section>

  <section class="grid" id="metrics" data-testid="scorecard-metrics"></section>
  <section class="status-line" id="sourceStatus" data-testid="scorecard-source-status"></section>
  <section class="status-line" id="scorecardStrategy4Live" data-testid="scorecard-strategy4-live-status">šşľšĽą4 latest run Ŕ«ÇňĆľńŞş...</section>
  <section class="summary" id="strategySummary" data-testid="scorecard-strategy-summary"></section>
  <nav class="tabs" id="tabs" data-testid="scorecard-strategy-tabs"></nav>
  <nav class="result-pills" id="resultPills" data-testid="scorecard-result-pills"></nav>

  <section class="panel">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ŠŚąŠťč</th>
            <th>šşľšĽą</th>
            <th>ń╗úŔÖč</th>
            <th>ňÉŹšĘ▒</th>
            <th>ÚÇ▓ňá┤ŠÖéÚľô</th>
            <th>ÚÇ▓ňá┤ňâ╣</th>
            <th>ŠťÇÚźśňâ╣</th>
            <th>ŠÉŹšŤŐ(ňůâ)</th>
            <th data-testid="scorecard-rule-group">šşľšĽąÚáůšŤ«</th>
            <th data-testid="scorecard-rule-tags">šşľšĽąš┤░Úáů</th>
            <th data-testid="scorecard-followup">7ŠŚąŔ┐ŻŔ╣Ą</th>
            <th>ňÄčňŤá</th>
          </tr>
        </thead>
        <tbody id="rows" data-testid="scorecard-rows">
          <tr><td colspan="12" class="empty">Ŕ╝ëňůąńŞş...</td></tr>
        </tbody>
      </table>
    </div>
  </section>
  <div class="footer" id="footer"></div>
</main>

<script>
let payload = null;
let activeStrategy = "ňůĘÚâĘ";
let activeResult = "all";
let activeDate = "";
const THEME_KEY = "fuman-scorecard-theme";
const countFmt = new Intl.NumberFormat("zh-TW");
const pnlFmt = new Intl.NumberFormat("zh-TW", { maximumFractionDigits: 2 });
const PNL_MULTIPLIER = 1000;
const count = (value) => countFmt.format(Math.round(Number(value) || 0));
const pnlText = (value) => pnlFmt.format((Number(value) || 0) * PNL_MULTIPLIER);
const price = (value) => (Number(value) || 0).toFixed(2);
const byId = (id) => document.getElementById(id);
const resultFilters = [
  ["all", "ňůĘÚâĘ"],
  ["win", "šŹ▓ňłę"],
  ["loss", "ŔÖžŠÉŹ"],
  ["flat", "ň╣│šŤĄ"],
];

function esc(value) {
  return String(value ?? "").replace(/[&<>"']/g, (char) => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    "\"": "&quot;",
    "'": "&#39;",
  }[char]));
}

function markerValue(text, key) {
  const escaped = String(key).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  const match = String(text ?? "").match(new RegExp(`${escaped}=([^´╝Ť;]+)`));
  return match ? match[1].trim() : "";
}

function splitReasonParts(text) {
  return String(text ?? "").split(/[´╝Ť;]/).map((part) => part.trim()).filter(Boolean);
}

function rowRuleGroup(row) {
  return row.rule_group || markerValue(row.reason, "šşľšĽąÚáůšŤ«") || "--";
}

function rowRuleTags(row) {
  const tags = Array.isArray(row.rule_tags) ? row.rule_tags : [];
  const marker = markerValue(row.reason, "šşľšĽąš┤░Úáů");
  const fromMarker = marker ? marker.split("|").map((tag) => tag.trim()).filter(Boolean) : [];
  return (tags.length ? tags : fromMarker).filter(Boolean).slice(0, 5);
}

function followupLabel(status) {
  const value = String(status || "").trim();
  if (value === "pending_7d_growth_check") return "ňżůŔ┐ŻŔ╣Ą";
  if (value === "positive_growth") return "ŠşúŠłÉÚĽĚ";
  if (value === "negative_growth") return "Šť¬ÚüöŠĘÖ";
  return value || "ňżůŔ┐ŻŔ╣Ą";
}

function rowFollowup(row) {
  const rule = row.followup_rule || markerValue(row.reason, "7ŠŚąŔ┐ŻŔ╣Ą");
  const days = Number(row.followup_days || 0) || (rule ? 7 : 0);
  if (!rule && !days) return "--";
  const status = row.followup_status || markerValue(row.reason, "Ŕ┐ŻŔ╣ĄšőÇŠůő");
  const due = row.followup_due_date ? `´Żť${row.followup_due_date}` : "";
  return `<strong>T+${days || 7} ŠşúŠłÉÚĽĚ</strong><br>${esc(followupLabel(status))}${esc(due)}`;
}

function renderRuleTags(row) {
  const tags = rowRuleTags(row);
  return tags.length ? tags.map((tag) => `<span class="tag">${esc(tag)}</span>`).join("") : "--";
}

function cleanReason(row) {
  const hiddenPrefixes = [
    "ŔŽĆňëçšëłŠťČ=",
    "šşľšĽąÚáůšŤ«=",
    "šşľšĽąš┤░Úáů=",
    "ÚÇ▓ňá┤ňâ╣ńżćŠ║É=",
    "7ŠŚąŔ┐ŻŔ╣Ą=",
    "Ŕ┐ŻŔ╣ĄšőÇŠůő=",
    "šşľšĽą1šÁÉš«Ś=",
    "šşľšĽą3ŠťÇÚźśňâ╣=",
  ];
  const visible = splitReasonParts(row.reason).filter((part) =>
    !hiddenPrefixes.some((prefix) => part.startsWith(prefix))
  );
  return visible.join("´╝Ť") || "--";
}

function metric(label, value, cls = "", testid = "") {
  return `<article class="card" ${testid ? `data-testid="${testid}"` : ""}><span>${label}</span><strong class="${cls}">${value}</strong></article>`;
}

function sourceStatus(payload, latestDate) {
  const qualityStatus = String(payload?.qualityStatus || "unknown").trim() || "unknown";
  const cacheSource = payload?.cacheSource || payload?.source || "scorecard";
  const reason = payload?.fallbackReason || payload?.reason || "";
  const pieces = [
    `šőÇŠůő´╝Ü${qualityStatus}`,
    `source=${cacheSource}`,
    `contract=${payload?.contract || "--"}`,
    `runId=${payload?.runId || "--"}`,
    `marketDate=${payload?.marketDate || latestDate || "--"}`,
  ];
  if (reason) pieces.push(`reason=${reason}`);
  return { qualityStatus, text: pieces.join("´Żť") };
}

function sourceReportForStrategy(strategy) {
  const normalized = String(strategy || "").toLowerCase();
  const reports = Array.isArray(payload?.sourceReports) ? payload.sourceReports : [];
  return reports.find((report) => {
    const keys = [report.key, report.strategy, report.strategyName, report.label]
      .map((value) => String(value || "").toLowerCase());
    return keys.includes(normalized)
      || (normalized.includes("šşľšĽą1") && keys.some((key) => key.includes("strategy1") || key.includes("open-buy")))
      || (normalized.includes("šşľšĽą2") && keys.some((key) => key.includes("strategy2")))
      || (normalized.includes("šşľšĽą3") && keys.some((key) => key.includes("strategy3")))
      || (normalized.includes("šşľšĽą4") && keys.some((key) => key.includes("strategy4")))
      || (normalized.includes("šşľšĽą5") && keys.some((key) => key.includes("strategy5")));
  }) || null;
}

function strategyRunId(row) {
  return row.runId
    || row.sourceRunId
    || row.payload?.runId
    || sourceReportForStrategy(row.strategy)?.runId
    || payload?.runId
    || "";
}

function strategy4LiveStatus(payload) {
  const qualityStatus = String(payload?.qualityStatus || payload?.status || "unknown").trim() || "unknown";
  const fallbackUsed = payload?.fallbackUsed === true;
  const publishAllowed = payload?.publishAllowed !== false && payload?.run_quality_at_publish?.publishAllowed !== false;
  const count = Number(payload?.resultCount ?? payload?.count ?? 0) || 0;
  const readback = Number(payload?.readbackCount ?? count) || 0;
  const runId = payload?.runId || payload?.latestRunId || "--";
  const source = payload?.cacheSource || payload?.source || "--";
  const pieces = [
    `šşľšĽą4 latest=${runId}`,
    `quality=${qualityStatus}`,
    `count=${count}`,
    `readback=${readback}`,
    `source=${source}`,
    `fallback=${fallbackUsed ? "true" : "false"}`,
    `publish=${publishAllowed ? "allowed" : "blocked"}`,
  ];
  const blockedReason = payload?.blockedReason || payload?.scanner_block_reason || "";
  if (blockedReason && !publishAllowed) pieces.push(`reason=${blockedReason}`);
  return { qualityStatus: publishAllowed && !fallbackUsed ? "complete" : "blocked", text: pieces.join("´Żť") };
}

function preferredTheme() {
  const saved = localStorage.getItem(THEME_KEY);
  if (saved === "sun" || saved === "night") return saved;
  return window.matchMedia?.("(prefers-color-scheme: light)")?.matches ? "sun" : "night";
}

function applyTheme(theme) {
  const next = theme === "sun" ? "sun" : "night";
  document.body.dataset.theme = next;
  localStorage.setItem(THEME_KEY, next);
  const button = byId("themeToggle");
  if (button) {
    const label = next === "sun" ? "ňłçŠĆŤŔç│ňĄťň╣ĽŠĘíň╝Ć" : "ňłçŠĆŤŔç│ÚÖŻňůëŠĘíň╝Ć";
    button.textContent = next === "sun" ? "Ôśż" : "ÔśÇ";
    button.setAttribute("aria-label", label);
    button.setAttribute("title", label);
    button.setAttribute("aria-pressed", String(next === "sun"));
  }
}

function uniqueStrategies(rows) {
  return ["ňůĘÚâĘ", ...new Set(rows.map((row) => row.strategy || "Šť¬ňłćÚí×"))];
}

function availableDates(rows) {
  return [...new Set(rows.map((row) => row.record_date).filter(Boolean))].sort().reverse();
}

function summarizeRows(rows, latestDate) {
  const wins = rows.filter((row) => Number(row.pnl) > 0).length;
  const losses = rows.filter((row) => Number(row.pnl) < 0).length;
  const flats = rows.length - wins - losses;
  const totalPnl = rows.reduce((sum, row) => sum + (Number(row.pnl) || 0), 0);
  const grouped = new Map();
  rows.forEach((row) => {
    const strategy = row.strategy || "Šť¬ňłćÚí×";
    grouped.set(strategy, [...(grouped.get(strategy) || []), row]);
  });
  const byStrategy = [...grouped.entries()].map(([strategy, items]) => {
    const strategyWins = items.filter((row) => Number(row.pnl) > 0).length;
    const strategyLosses = items.filter((row) => Number(row.pnl) < 0).length;
    const strategyPnl = items.reduce((sum, row) => sum + (Number(row.pnl) || 0), 0);
    return {
      strategy,
      rows: items.length,
      wins: strategyWins,
      losses: strategyLosses,
      flats: items.length - strategyWins - strategyLosses,
      winRate: items.length ? (strategyWins / items.length) * 100 : 0,
      pnl: strategyPnl,
    };
  }).sort((a, b) => b.pnl - a.pnl || b.rows - a.rows);
  return {
    latestDate,
    rows: rows.length,
    wins,
    losses,
    flats,
    winRate: rows.length ? (wins / rows.length) * 100 : 0,
    totalPnl,
    byStrategy,
  };
}

function renderHistoryDateOptions(dates) {
  const select = byId("historyDate");
  select.innerHTML = dates.map((date) =>
    `<option value="${esc(date)}" ${date === activeDate ? "selected" : ""}>${esc(date)}</option>`
  ).join("");
  select.disabled = dates.length <= 1;
}

function render() {
  if (!payload?.ok) return;
  const rows = payload.records || [];
  const dates = Array.isArray(payload.historyDates) && payload.historyDates.length ? payload.historyDates : availableDates(rows);
  if (!activeDate || !dates.includes(activeDate)) activeDate = payload.selectedDate || payload.latestDate || dates[0] || "";
  renderHistoryDateOptions(dates);
  const summary = payload.summary?.rows === rows.length ? payload.summary : summarizeRows(rows, activeDate || payload.latestDate || "--");
  const latestDate = summary.latestDate || payload.latestDate || "--";
  const updatedAt = payload.updatedAt ? new Date(payload.updatedAt).toLocaleString("zh-TW", { hour12: false }) : "--";
  byId("subtitle").textContent = `Ŕ│çŠľÖŠŚąŠťč ${latestDate}´ŻťňĆ»ÚüŞŠťÇŔ┐Ĺ ${payload.days || 30} ňĄę´Żť${updatedAt}`;
  const status = sourceStatus(payload, latestDate);
  const statusNode = byId("sourceStatus");
  statusNode.className = `status-line ${status.qualityStatus}`;
  statusNode.textContent = status.text;

  byId("metrics").innerHTML = [
    metric("ÚÇÉšşćšşćŠĽŞ", count(summary.rows), "", "scorecard-metric-rows"),
    metric("ňőŁšÄç", `${(summary.winRate || 0).toFixed(1)}%`, "good", "scorecard-metric-winrate"),
    metric("šŹ▓ňłę / ŔÖžŠÉŹ", `${count(summary.wins)} / ${count(summary.losses)}`, "", "scorecard-metric-wl"),
    metric("šŞŻŠÉŹšŤŐ", pnlText(summary.totalPnl), (summary.totalPnl || 0) >= 0 ? "good" : "bad", "scorecard-metric-pnl"),
  ].join("");

  const strategies = uniqueStrategies(rows);
  byId("tabs").innerHTML = strategies.map((strategy) =>
    `<button class="tab ${strategy === activeStrategy ? "active" : ""}" data-strategy="${esc(strategy)}" type="button">${esc(strategy)}</button>`
  ).join("");

  byId("resultPills").innerHTML = resultFilters.map(([value, label]) =>
    `<button class="pill ${value === activeResult ? "active" : ""}" data-result="${value}" type="button">${esc(label)}</button>`
  ).join("");

  byId("strategySummary").innerHTML = (summary.byStrategy || []).map((item) =>
    metric(`${esc(item.strategy)}´Żť${count(item.rows)}šşć`, `${pnlText(item.pnl)}´Żť${(item.winRate || 0).toFixed(1)}%`, (item.pnl || 0) >= 0 ? "good" : "bad", "scorecard-strategy-card")
  ).join("");

  const query = byId("search").value.trim().toLowerCase();
  const filtered = rows.filter((row) =>
    (activeStrategy === "ňůĘÚâĘ" || row.strategy === activeStrategy)
    && (!query || String(row.ticker).toLowerCase().includes(query) || String(row.name).toLowerCase().includes(query))
    && (activeResult === "all"
      || (activeResult === "win" && Number(row.pnl) > 0)
      || (activeResult === "loss" && Number(row.pnl) < 0)
      || (activeResult === "flat" && Number(row.pnl) === 0))
  );

  byId("rows").innerHTML = filtered.length ? filtered.map((row) => `
    <tr data-strategy="${esc(row.strategy || "")}" data-run-id="${esc(strategyRunId(row))}" data-source-report-run-id="${esc(sourceReportForStrategy(row.strategy)?.runId || "")}">
      <td>${esc(row.record_date)}</td>
      <td>${esc(row.strategy)}</td>
      <td>${esc(row.ticker)}</td>
      <td>${esc(row.name)}</td>
      <td>${esc(row.entry_time || "--")}</td>
      <td>${price(row.entry_price)}</td>
      <td>${price(row.high_price)}</td>
      <td class="${Number(row.pnl) >= 0 ? "good" : "bad"}">${pnlText(row.pnl)}</td>
      <td class="rule-group">${esc(rowRuleGroup(row))}</td>
      <td class="rule-tags">${renderRuleTags(row)}</td>
      <td class="followup">${rowFollowup(row)}</td>
      <td class="reason">${esc(cleanReason(row))}</td>
    </tr>
  `).join("") : `<tr><td colspan="12" class="empty">Š▓ĺŠťëšČŽňÉłŠóŁń╗ÂšÜäŔ│çŠľÖ</td></tr>`;

  byId("footer").textContent = `ńżćŠ║É´╝Ü${payload.cacheSource || payload.source || "scorecard"}´ŻťqualityStatus ${payload.qualityStatus || "unknown"}´ŻťŠŚąŠťč ${latestDate}´ŻťÚí»šĄ║ ${filtered.length} / ${rows.length} šşć´ŻťŠşĚňĆ▓ŠŚąŠťč ${dates.length} ňĄę`;
}

async function load(date = "") {
  byId("rows").innerHTML = `<tr><td colspan="12" class="empty">Ŕ╝ëňůąńŞş...</td></tr>`;
  try {
    const dateQuery = date ? `&date=${encodeURIComponent(date)}` : "";
    const response = await fetch(`/api/scorecard?t=${Date.now()}${dateQuery}`, { cache: "no-store" });
    payload = await response.json();
    if (!payload.ok) throw new Error(payload.reason || payload.error || "scorecard unavailable");
    activeDate = payload.selectedDate || payload.latestDate || availableDates(payload.records || [])[0] || "";
    render();
  } catch (error) {
    byId("subtitle").textContent = "ŠłÉšŞżňľ«Ŕ│çŠľÖŠÜźŠÖéšäíŠ│ĽŔ«ÇňĆľ";
    byId("rows").innerHTML = `<tr><td colspan="12" class="empty">${esc(error.message || error)}</td></tr>`;
  }
}

async function loadStrategy4Live() {
  const node = byId("scorecardStrategy4Live");
  if (!node) return;
  try {
    const response = await fetch(`/api/strategy4-latest?canvas=1&compact=1&shell=1&limit=70&live=1&t=${Date.now()}`, { cache: "no-store" });
    const live = await response.json();
    if (!response.ok || live.ok === false) throw new Error(live.reason || live.error || `HTTP ${response.status}`);
    const status = strategy4LiveStatus(live);
    node.className = `status-line ${status.qualityStatus}`;
    node.textContent = status.text;
  } catch (error) {
    node.className = "status-line blocked";
    node.textContent = `šşľšĽą4 latest=unavailable´Żťreason=${error.message || error}`;
  }
}

byId("tabs").addEventListener("click", (event) => {
  const button = event.target.closest("[data-strategy]");
  if (!button) return;
  activeStrategy = button.dataset.strategy;
  render();
});
byId("resultPills").addEventListener("click", (event) => {
  const button = event.target.closest("[data-result]");
  if (!button) return;
  activeResult = button.dataset.result;
  render();
});
byId("search").addEventListener("input", render);
byId("historyDate").addEventListener("change", (event) => {
  activeDate = event.target.value;
  activeStrategy = "ňůĘÚâĘ";
  activeResult = "all";
  load(activeDate);
});
byId("themeToggle").addEventListener("click", () => {
  applyTheme(document.body.dataset.theme === "sun" ? "night" : "sun");
});
byId("reload").addEventListener("click", load);
applyTheme(preferredTheme());
load();
loadStrategy4Live();
