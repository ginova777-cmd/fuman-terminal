<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>輔滿成績單</title>
  <script src="/terminal-entitlement-guard.js?v=public-terminal-fast-20260714-03&membership-lock=20260713-11"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f14;
      --panel: #141a22;
      --panel-2: #101720;
      --head: #111720;
      --line: #27313f;
      --text: #f3f7fb;
      --muted: #94a3b8;
      --good: #5ee0a0;
      --bad: #ff7a90;
      --brand: #ff9b45;
      --soft: #1d2633;
      --button-text: #17100a;
    }
    body[data-theme="sun"] {
      color-scheme: light;
      --bg: #f6f8fb;
      --panel: #ffffff;
      --panel-2: #f1f5f9;
      --head: #eef3f8;
      --line: #cbd5e1;
      --text: #172033;
      --muted: #64748b;
      --good: #047857;
      --bad: #be123c;
      --brand: #d97706;
      --soft: #e8eef6;
      --button-text: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft JhengHei", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    main {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 22px 16px 42px;
    }
    .top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }
    .badge {
      color: var(--brand);
      font-weight: 800;
      letter-spacing: .08em;
      font-size: 12px;
    }
    h1 {
      margin: 6px 0 8px;
      font-size: clamp(28px, 5vw, 48px);
      letter-spacing: 0;
    }
    p { margin: 0; color: var(--muted); }
    button, input { font: inherit; }
    .tools {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }
    .tools input,
    .tools select {
      width: min(280px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .tools select {
      width: min(180px, 100%);
      cursor: pointer;
    }
    .tools button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: var(--button-text);
      font-weight: 800;
      padding: 10px 14px;
      cursor: pointer;
    }
    .tools .ghost {
      background: var(--soft);
      border: 1px solid var(--line);
      color: var(--text);
    }
    #themeToggle {
      color: #facc15;
    }
    .device-switcher {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    .device-switcher a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      border-radius: 6px;
      padding: 8px 11px;
      background: var(--soft);
      color: var(--text);
      font-weight: 800;
      text-decoration: none;
      white-space: nowrap;
    }
    .device-switcher a:hover,
    .device-switcher a:focus-visible {
      outline: 2px solid var(--brand);
      outline-offset: 1px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 16px 0;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      min-width: 0;
    }
    .card span {
      display: block;
      color: var(--muted);
      font-size: 13px;
    }
    .card strong {
      display: block;
      font-size: 26px;
      margin-top: 8px;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }
    .summary,
    .basis,
    .audit-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin: 0 0 14px;
    }
    .basis .card strong {
      font-size: 18px;
      line-height: 1.35;
    }
    .tabs,
    .result-pills {
      display: flex;
      gap: 8px;
      overflow: auto;
      margin: 14px 0;
      padding-bottom: 2px;
    }
    .tab,
    .pill {
      background: var(--soft);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 8px;
      padding: 9px 12px;
      white-space: nowrap;
      cursor: pointer;
    }
    .tab.active,
    .pill.active {
      border-color: var(--brand);
      color: var(--brand);
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .table-wrap {
      overflow: auto;
      max-height: 68vh;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1280px;
    }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      white-space: nowrap;
    }
    th {
      position: sticky;
      top: 0;
      background: var(--head);
      color: var(--text);
      z-index: 1;
    }
    td.reason {
      white-space: normal;
      min-width: 260px;
      color: var(--muted);
    }
    td.rule-group {
      white-space: normal;
      min-width: 150px;
      font-weight: 800;
      color: var(--text);
    }
    td.rule-tags {
      white-space: normal;
      min-width: 220px;
    }
    td.followup {
      white-space: normal;
      min-width: 150px;
      color: var(--muted);
    }
    .tag {
      display: inline-block;
      margin: 0 4px 4px 0;
      padding: 3px 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--soft);
      color: var(--text);
      font-size: 12px;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }
    .followup strong {
      color: var(--good);
      font-weight: 800;
    }
    .good { color: var(--good); font-weight: 800; }
    .bad { color: var(--bad); font-weight: 800; }
    .empty {
      padding: 28px;
      text-align: center;
      color: var(--muted);
    }
    .footer {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
    }
    .status-line {
      margin: 10px 0 0;
      padding: 9px 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }
    .status-line.complete {
      border-color: rgba(94, 224, 160, .45);
      color: var(--good);
    }
    .status-line.degraded,
    .status-line.stale,
    .status-line.blocked {
      border-color: rgba(255, 122, 144, .55);
      color: var(--bad);
    }
    .entry-panel,
    .audit-panel {
      margin: 14px 0;
      padding: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .entry-panel h2,
    .audit-panel h2 {
      margin: 0 0 10px;
      font-size: 18px;
      letter-spacing: 0;
    }
    .entry-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }
    .entry-table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .entry-table {
      min-width: 920px;
    }
    .entry-table td.note {
      white-space: normal;
      min-width: 220px;
      color: var(--muted);
    }
    .audit-grid .card strong {
      font-size: 18px;
      line-height: 1.35;
    }
    .audit-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }
    .audit-item {
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--muted);
      line-height: 1.5;
      overflow-wrap: anywhere;
    }
    .audit-item strong {
      color: var(--text);
    }
    .audit-item.pass strong,
    .audit-item.pass .audit-state {
      color: var(--good);
    }
    .audit-item.fail strong,
    .audit-item.fail .audit-state {
      color: var(--bad);
    }
    .evidence {
      white-space: normal;
      min-width: 360px;
      color: var(--muted);
      line-height: 1.45;
    }
    .evidence summary {
      cursor: pointer;
      color: var(--text);
      font-weight: 800;
    }
    .evidence pre {
      max-width: 520px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      margin: 8px 0 0;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--bg);
      color: var(--muted);
      font-size: 12px;
    }
    @media (max-width: 760px) {
      main { padding: 16px 10px 32px; }
      .top { display: block; }
      .tools {
        margin-top: 14px;
        justify-content: stretch;
      }
      .tools input,
      .tools select,
      .tools button,
      .device-switcher {
        width: 100%;
      }
      .device-switcher a {
        flex: 1;
      }
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .card strong {
        font-size: 22px;
      }
      table { min-width: 1180px; }
      th, td { padding: 9px 10px; }
    }
  </style>
</head>
<body>
<main>
  <section class="top" data-testid="scorecard-hero">
    <div>
      <div class="badge">FUMAN SCORECARD</div>
      <h1>輔滿成績單</h1>
      <p id="subtitle">正在讀取公開成績單資料...</p>
    </div>
    <div class="tools">
      <select id="historyDate" aria-label="選擇歷史成績單日期" data-testid="scorecard-history-date">
        <option value="">最新日期</option>
      </select>
      <input id="search" type="search" placeholder="搜尋代號 / 名稱" aria-label="搜尋代號或名稱">
      <nav class="device-switcher" id="deviceSwitcher" data-testid="scorecard-device-switcher" aria-label="切換網頁版本">
        <a href="/api/mobile-page" data-testid="scorecard-mobile-link">手機版</a>
        <a href="/?desktop=1" data-testid="scorecard-desktop-link">電腦版</a>
      </nav>
      <button id="themeToggle" class="ghost" type="button" data-testid="scorecard-theme-toggle" aria-pressed="false" aria-label="切換至陽光模式" title="切換至陽光模式">☀</button>
      <button id="reload" type="button">重新整理</button>
    </div>
  </section>

  <section class="grid" id="metrics" data-testid="scorecard-metrics"></section>
  <section class="status-line" id="sourceStatus" data-testid="scorecard-source-status" hidden></section>
  <section class="status-line" id="scorecardSourceReports" data-testid="scorecard-source-reports" hidden>sourceReports 讀取中...</section>
  <section class="status-line" id="scorecardStrategy4Live" data-testid="scorecard-strategy4-live-status" hidden>策略4 latest run 讀取中...</section>
  <section class="audit-panel" id="auditPanel" data-testid="scorecard-audit-panel" hidden></section>
  <section class="summary" id="strategySummary" data-testid="scorecard-strategy-summary"></section>
  <nav class="tabs" id="tabs" data-testid="scorecard-strategy-tabs"></nav>
  <nav class="result-pills" id="resultPills" data-testid="scorecard-result-pills"></nav>

  <section class="panel">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>日期</th>
            <th>策略</th>
            <th>代號</th>
            <th>名稱</th>
            <th>進場時間</th>
            <th>進場價</th>
            <th>最高價</th>
            <th>損益(元)</th>
            <th data-testid="scorecard-followup">7日追蹤</th>
          </tr>
        </thead>
        <tbody id="rows" data-testid="scorecard-rows">
          <tr><td colspan="9" class="empty">載入中...</td></tr>
        </tbody>
      </table>
    </div>
  </section>
  <template id="scorecardPrivateContractMarkers" data-testid="scorecard-private-contract-markers">
    scorecard-rule-group scorecard-rule-tags
    策略項目 策略細項
  </template>
  <div class="footer" id="footer"></div>
</main>

<script>
let payload = null;
let daytradeEntryPayload = null;
let sevenStrategyDailyHistoryPayload = null;
let activeStrategy = "全部";
let activeSupplement = "";
let activeResult = "all";
let activeDate = "";
const THEME_KEY = "fuman-scorecard-theme";
const countFmt = new Intl.NumberFormat("zh-TW");
const pnlFmt = new Intl.NumberFormat("zh-TW", { maximumFractionDigits: 2 });
const PNL_MULTIPLIER = 1000;
const count = (value) => countFmt.format(Math.round(Number(value) || 0));
const pnlText = (value) => pnlFmt.format((Number(value) || 0) * PNL_MULTIPLIER);
const price = (value) => (Number(value) || 0).toFixed(2);
const optionalPrice = (value) => {
  const number = Number(value);
  return Number.isFinite(number) ? number.toFixed(2) : "--";
};
const byId = (id) => document.getElementById(id);
const resultFilters = [
  ["all", "全部"],
  ["win", "獲利"],
  ["loss", "虧損"],
  ["flat", "平盤"],
];

function esc(value) {
  return String(value ?? "").replace(/[&<>"']/g, (char) => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    "\"": "&quot;",
    "'": "&#39;",
  }[char]));
}

function markerValue(text, key) {
  const escaped = String(key).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  const match = String(text ?? "").match(new RegExp(`${escaped}=([^；;]+)`));
  return match ? match[1].trim() : "";
}

function splitReasonParts(text) {
  return String(text ?? "").split(/[；;]/).map((part) => part.trim()).filter(Boolean);
}

function rowRuleGroup(row) {
  return row.rule_group || markerValue(row.reason, "策略項目") || "--";
}

function rowRuleTags(row) {
  const tags = Array.isArray(row.rule_tags) ? row.rule_tags : [];
  const marker = markerValue(row.reason, "策略細項");
  const fromMarker = marker ? marker.split("|").map((tag) => tag.trim()).filter(Boolean) : [];
  return (tags.length ? tags : fromMarker).filter(Boolean).slice(0, 5);
}

function followupLabel(status) {
  const value = String(status || "").trim();
  if (value === "pending_7d_growth_check") return "待追蹤";
  if (value === "positive_growth") return "正成長";
  if (value === "negative_growth") return "未達標";
  return value || "待追蹤";
}

function rowFollowup(row) {
  const rule = row.followup_rule || markerValue(row.reason, "7日追蹤");
  const days = Number(row.followup_days || 0) || (rule ? 7 : 0);
  if (!rule && !days) return "--";
  const status = row.followup_status || markerValue(row.reason, "追蹤狀態");
  const due = row.followup_due_date ? `｜${row.followup_due_date}` : "";
  return `<strong>T+${days || 7} 正成長</strong><br>${esc(followupLabel(status))}${esc(due)}`;
}

function renderRuleTags(row) {
  const tags = rowRuleTags(row);
  return tags.length ? tags.map((tag) => `<span class="tag">${esc(tag)}</span>`).join("") : "--";
}

function cleanReason(row) {
  const hiddenPrefixes = [
    "規則版本=",
    "策略項目=",
    "策略細項=",
    "進場價來源=",
    "7日追蹤=",
    "追蹤狀態=",
    "策略1結算=",
    "策略3最高價=",
  ];
  const visible = splitReasonParts(row.reason).filter((part) =>
    !hiddenPrefixes.some((prefix) => part.startsWith(prefix))
  );
  return visible.join("；") || "--";
}

function metric(label, value, cls = "", testid = "") {
  return `<article class="card" ${testid ? `data-testid="${testid}"` : ""}><span>${label}</span><strong class="${cls}">${value}</strong></article>`;
}

function compactJson(value) {
  if (value === undefined) return "--";
  try {
    return JSON.stringify(value, null, 2);
  } catch {
    return String(value);
  }
}

function listText(value) {
  if (Array.isArray(value)) return value.length ? value.join("；") : "無";
  if (value && typeof value === "object") return compactJson(value);
  return String(value || "無");
}

function rowEvidenceOk(row) {
  const evidence = String(row.evidenceStatus || "").toLowerCase();
  const blockers = Array.isArray(row.blockers) ? row.blockers : [];
  const blanks = row.blankCounts && typeof row.blankCounts === "object"
    ? Object.values(row.blankCounts).reduce((sum, value) => sum + (Number(value) || 0), 0)
    : 1;
  return (evidence === "complete" || evidence === "sufficient")
    && row.needsHumanWatch === false
    && blockers.length === 0
    && row.fallbackUsed !== true
    && row.publishAllowed === true
    && Boolean(row.source_snapshot_captured_at)
    && blanks === 0;
}

function renderEvidence(row) {
  const ok = rowEvidenceOk(row);
  const blockers = Array.isArray(row.blockers) ? row.blockers : [];
  const warnings = Array.isArray(row.warnings) ? row.warnings : [];
  const details = {
    strategyName: row.strategyName || row.strategy || "",
    endpoint: row.endpoint || "",
    runId: row.runId || "",
    tradeDate: row.tradeDate || row.record_date || "",
    usedDate: row.usedDate || row.record_date || "",
    updatedAt: row.updatedAt || "",
    unattendedStatus: row.unattendedStatus || (ok ? "YES" : "NO"),
    evidenceStatus: row.evidenceStatus || "insufficient",
    needsHumanWatch: row.needsHumanWatch !== false,
    blockers,
    warnings,
    fallbackUsed: row.fallbackUsed === true,
    fallbackScope: row.fallbackScope || [],
    fallbackDetails: row.fallbackDetails || [],
    publishAllowed: row.publishAllowed === true,
    source_snapshot_captured_at: row.source_snapshot_captured_at || "",
    source_status_at_run: row.source_status_at_run || "not_available",
    quote_coverage_at_run: row.quote_coverage_at_run || "not_available",
    intraday_1m_readiness_at_run: row.intraday_1m_readiness_at_run || "not_available",
    ma_readiness_at_run: row.ma_readiness_at_run || "not_available",
    preopen_futopt_daily_readiness_at_run: row.preopen_futopt_daily_readiness_at_run || "not_available",
    run_quality_at_publish: row.run_quality_at_publish || "not_available",
    writeBudget: row.writeBudget || "not_available",
    retentionOk: row.retentionOk ?? "not_available",
    requiredFields: row.requiredFields || [],
    blankCounts: row.blankCounts || {},
    sampleMissingRows: row.sampleMissingRows || [],
  };
  const state = ok ? "YES" : (row.unattendedStatus || "NO");
  const cls = ok ? "good" : "bad";
  return `<details><summary><span class="${cls}">${esc(state)}</span>｜${esc(details.evidenceStatus)}｜blockers ${blockers.length}</summary><pre>${esc(compactJson(details))}</pre></details>`;
}

function supplementalEvidence(row) {
  const details = row.supplementalEvidence || {};
  return `<details><summary><span class="good">SOURCE</span>｜${esc(details.sourceName || row.strategy || "--")}｜${esc(details.source || "--")}</summary><pre>${esc(compactJson(details))}</pre></details>`;
}

function renderTableRows(rows, emptyText = "沒有符合條件的資料") {
  return rows.length ? rows.map((row) => `
    <tr data-strategy="${esc(row.strategy || "")}" data-run-id="${esc(strategyRunId(row))}" data-source-report-run-id="${esc(sourceReportForStrategy(row.strategy)?.runId || "")}">
      <td>${esc(row.record_date)}</td>
      <td>${esc(row.strategy)}</td>
      <td>${esc(row.ticker)}</td>
      <td>${esc(row.name)}</td>
      <td>${esc(row.entry_time || "--")}</td>
      <td>${price(row.entry_price)}</td>
      <td>${price(row.high_price)}</td>
      <td class="${Number(row.pnl) >= 0 ? "good" : "bad"}">${pnlText(row.pnl)}</td>
      <td class="followup">${rowFollowup(row)}</td>
    </tr>
  `).join("") : `<tr><td colspan="9" class="empty">${esc(emptyText)}</td></tr>`;
}

function daytradeRowsForTable() {
  const data = daytradeEntryPayload || {};
  const rows = Array.isArray(data.rows) ? data.rows : [];
  return rows.map((row) => ({
    supplementalSource: "daytrade_ps1",
    record_date: row.trade_date || data.tradeDate || "",
    strategy: "當沖 PS1",
    ticker: row.symbol || "",
    name: row.name || "",
    entry_time: row.entry_time || "",
    entry_price: row.entry_price,
    high_price: row.current_price,
    pnl: 0,
    rule_group: "當沖 PS1 今日進場",
    rule_tags: [row.strategy_label || "PS1", row.source || "supabase"],
    reason: row.note || "Supabase 今日正式紀錄",
    supplementalEvidence: {
      sourceName: "fugle_daytrade_entry_history",
      apiSource: data.source || "supabase:public.fugle_daytrade_entry_history",
      table: data.table || "public.fugle_daytrade_entry_history",
      tradeDate: data.tradeDate || row.trade_date || "",
      timeWindow: data.timeWindow || { from: "09:00:00", to: "13:30:00", timezone: "Asia/Taipei" },
      source: row.source || "",
      updatedAt: data.updatedAt || "",
    },
  }));
}

function sevenStrategyRowsForTable() {
  const data = sevenStrategyDailyHistoryPayload || {};
  const rows = Array.isArray(data.rows) ? data.rows : [];
  return rows.map((row) => ({
    supplementalSource: "seven_strategy_daily_history",
    record_date: row.tradeDate || data.tradeDate || "",
    strategy: "七策略每日紀錄",
    ticker: row.symbol || "",
    name: row.name || "",
    entry_time: row.detectTime || "",
    entry_price: row.entryPrice,
    high_price: row.currentPrice,
    pnl: 0,

function auditChecks(payload, rows) {
  const audit = payload.audit || {};
  const rowCount = rows.length;
  const rowEvidencePass = rowCount > 0 && rows.every(rowEvidenceOk);
  const surfaces = Array.isArray(audit.surfaces) ? audit.surfaces : [];
  const surfacesPass = surfaces.length >= 16 && surfaces.every((item) => item.unattendedStatus === "YES");
  const topSources = Array.isArray(payload.sources);
  const topIssues = Array.isArray(payload.issues);
  const topWarnings = Array.isArray(payload.warnings);
  const productionIdentity = Boolean(payload.runId && payload.contract && payload.marketDate);
  return [
    ["Page shell", true, "頁面殼已載入，資料只經 API 讀取"],
    ["Scorecard API", payload.ok === true && payload.qualityStatus === "complete" && payload.cacheSource === "supabase-snapshot", `qualityStatus=${payload.qualityStatus || "--"} cacheSource=${payload.cacheSource || "--"}`],
    ["Scorecard Health", payload.healthOk === true || audit.healthOk === true || rowEvidencePass, "以 API row evidence 作為頁面即時閘門；health 仍須獨立驗證"],
    ["Strategy coverage", surfacesPass || audit.strategyCount >= 9, `strategies=${audit.strategyCount || 0} surfaces=${surfaces.length}`],
    ["Runtime source snapshot coverage", rowEvidencePass, "每列必須有 source_snapshot_captured_at 與 source 狀態"],
    ["Field completeness", rowEvidencePass, "每列 requiredFields/blankCounts/sampleMissingRows 必須完整"],
    ["Fallback disclosure", rows.every((row) => row.fallbackUsed !== true || (Array.isArray(row.fallbackDetails) && row.fallbackDetails.length > 0)), "fallbackUsed=true 時必須揭露 scope/details"],
    ["Old cache disabled", payload.cacheSource !== "json-snapshot", `cacheSource=${payload.cacheSource || "--"}`],
    ["API patrol alignment", audit.unattendedStatus === "YES", `audit=${audit.unattendedStatus || "--"}`],
    ["Schedule chain", audit.scheduleOk === true || surfacesPass, "Windows Task receipt 需另以本機巡檢對齊"],
    ["Production identity", productionIdentity, `runId=${payload.runId || "--"} contract=${payload.contract || "--"}`],
    ["Service worker/cache", true, "fetch cache=no-store + cache buster"],
    ["Negative tests", rowEvidencePass, "缺 evidence/blocker/fallback/missing snapshot 時 row 不會是 YES"],
    ["Live A source evidence", rowEvidencePass, rowEvidencePass ? "PASS" : "BLOCKED_BY_SUPABASE_INCIDENT / FAIL"],
    ["Top-level issues/warnings", topSources && topIssues && topWarnings, "sources/issues/warnings 必須存在"],
  ];
}

function sourceStatus(payload, latestDate) {
  const qualityStatus = String(payload?.qualityStatus || "unknown").trim() || "unknown";
  const cacheSource = payload?.cacheSource || payload?.source || "scorecard";
  const reason = payload?.fallbackReason || payload?.reason || "";
  const pieces = [
    `狀態：${qualityStatus}`,
    `source=${cacheSource}`,
    `contract=${payload?.contract || "--"}`,
    `runId=${payload?.runId || "--"}`,
    `marketDate=${payload?.marketDate || latestDate || "--"}`,
  ];
  if (reason) pieces.push(`reason=${reason}`);
  return { qualityStatus, text: pieces.join("｜") };
}

function sourceReportForStrategy(strategy) {
  const normalized = String(strategy || "").toLowerCase();
  const reports = Array.isArray(payload?.sourceReports) ? payload.sourceReports : [];
  return reports.find((report) => {
    const keys = [report.key, report.strategy, report.strategyName, report.label]
      .map((value) => String(value || "").toLowerCase());
    return keys.includes(normalized)
      || (normalized.includes("策略1") && keys.some((key) => key.includes("strategy1") || key.includes("open-buy")))
      || (normalized.includes("策略2") && keys.some((key) => key.includes("strategy2")))
      || (normalized.includes("策略3") && keys.some((key) => key.includes("strategy3")))
      || (normalized.includes("策略4") && keys.some((key) => key.includes("strategy4")))
      || (normalized.includes("策略5") && keys.some((key) => key.includes("strategy5")));
  }) || null;
}

function sourceReportsStatus(payload) {
  const reports = Array.isArray(payload?.sourceReports) ? payload.sourceReports : [];
  if (!reports.length) return { qualityStatus: "blocked", text: "sourceReports=missing｜策略來源回讀不可驗" };
  const keyOrder = ["strategy1", "strategy2", "strategy3", "strategy4", "strategy5", "seven_strategy_daily_history", "institution", "cb", "warrant", "realtime-radar"];
  const byKey = new Map(reports.map((report) => [String(report.key || report.strategy || report.label || "").toLowerCase(), report]));
  const ordered = [
    ...keyOrder.map((key) => reports.find((report) => String(report.key || report.strategy || "").toLowerCase() === key)).filter(Boolean),
    ...reports.filter((report) => !keyOrder.includes(String(report.key || report.strategy || "").toLowerCase())),
  ];
  const text = ordered.map((report) => {
    const key = report.key || report.strategy || report.label || "--";
    const runId = report.runId || report.run_id || "--";
    const evidence = report.evidenceStatus || report.sourceEvidenceStatus || "--";
    const publish = report.publishAllowed === true ? "allowed" : report.publishAllowed === false ? "blocked" : "--";
    return `${key}=${runId}｜evidence=${evidence}｜publish=${publish}`;
  }).join("；");
  const blocked = ordered.some((report) => report.evidenceStatus === "insufficient" || report.publishAllowed === false || report.blockedReason);
  return { qualityStatus: blocked ? "partial" : "complete", text };
}

function strategyRunId(row) {
  return sourceReportForStrategy(row.strategy)?.runId
    || row.sourceRunId
    || row.payload?.runId
    || row.runId
    || payload?.runId
    || "";
}

function strategy4LiveStatus(payload) {
  const qualityStatus = String(payload?.qualityStatus || payload?.status || "unknown").trim() || "unknown";
  const fallbackUsed = payload?.fallbackUsed === true;
  const publishAllowed = payload?.publishAllowed !== false && payload?.run_quality_at_publish?.publishAllowed !== false;
  const count = Number(payload?.resultCount ?? payload?.count ?? 0) || 0;
  const readback = Number(payload?.readbackCount ?? count) || 0;
  const runId = payload?.runId || payload?.latestRunId || "--";
  const source = payload?.cacheSource || payload?.source || "--";
  const pieces = [
    `策略4 latest=${runId}`,
    `quality=${qualityStatus}`,
    `count=${count}`,
    `readback=${readback}`,
    `source=${source}`,
    `fallback=${fallbackUsed ? "true" : "false"}`,
    `publish=${publishAllowed ? "allowed" : "blocked"}`,
  ];
  const blockedReason = payload?.blockedReason || payload?.scanner_block_reason || "";
  if (blockedReason && !publishAllowed) pieces.push(`reason=${blockedReason}`);
  return { qualityStatus: publishAllowed && !fallbackUsed ? "complete" : "blocked", text: pieces.join("｜") };
}

function uniqueStrategies(rows) {
  return ["全部", ...new Set(rows.map((row) => row.strategy || "未分類"))];
}

function availableDates(rows) {
  return [...new Set(rows.map((row) => row.record_date).filter(Boolean))].sort().reverse();
}

function summarizeRows(rows, latestDate) {
  const wins = rows.filter((row) => Number(row.pnl) > 0).length;
  const losses = rows.filter((row) => Number(row.pnl) < 0).length;
  const flats = rows.length - wins - losses;
  const totalPnl = rows.reduce((sum, row) => sum + (Number(row.pnl) || 0), 0);
  const grouped = new Map();
  rows.forEach((row) => {
    const strategy = row.strategy || "未分類";
    grouped.set(strategy, [...(grouped.get(strategy) || []), row]);
  });
  const byStrategy = [...grouped.entries()].map(([strategy, items]) => {
    const strategyWins = items.filter((row) => Number(row.pnl) > 0).length;
    const strategyLosses = items.filter((row) => Number(row.pnl) < 0).length;
    const strategyPnl = items.reduce((sum, row) => sum + (Number(row.pnl) || 0), 0);
    return {
      strategy,
      rows: items.length,
      wins: strategyWins,
      losses: strategyLosses,
      flats: items.length - strategyWins - strategyLosses,
      winRate: items.length ? (strategyWins / items.length) * 100 : 0,
      pnl: strategyPnl,
    };
  }).sort((a, b) => b.pnl - a.pnl || b.rows - a.rows);
  return {
    latestDate,
    rows: rows.length,
    wins,
    losses,
    flats,
    winRate: rows.length ? (wins / rows.length) * 100 : 0,
    totalPnl,
    byStrategy,
  };
}

async function load(date = "") {
  byId("rows").innerHTML = `<tr><td colspan="13" class="empty">載入中...</td></tr>`;
  try {
    const dateQuery = date ? `&date=${encodeURIComponent(date)}` : "";
    const response = await fetch(`/api/scorecard?live=1&t=${Date.now()}${dateQuery}`, { cache: "no-store" });
    payload = await response.json();
    if (!payload.ok) throw new Error(payload.reason || payload.error || "scorecard unavailable");
    activeDate = payload.selectedDate || payload.latestDate || availableDates(payload.records || [])[0] || "";
    render();
  } catch (error) {
    byId("subtitle").textContent = "成績單資料暫時無法讀取";
    byId("rows").innerHTML = `<tr><td colspan="13" class="empty">${esc(error.message || error)}</td></tr>`;
  }
}

async function loadStrategy4Live() {
  const node = byId("scorecardStrategy4Live");
  if (!node) return;
  try {
    const response = await fetch(`/api/strategy4-latest?canvas=1&compact=1&shell=1&limit=70&live=1&t=${Date.now()}`, { cache: "no-store" });
    const live = await response.json();
    if (!response.ok || live.ok === false) throw new Error(live.reason || live.error || `HTTP ${response.status}`);
    const status = strategy4LiveStatus(live);
    node.className = `status-line ${status.qualityStatus}`;
    node.textContent = status.text;
  } catch (error) {
    node.className = "status-line blocked";
    node.textContent = `策略4 latest=unavailable｜reason=${error.message || error}`;
  }
}

async function loadDaytradeEntries() {
  daytradeEntryPayload = {
    ok: false,
    source: "supabase:public.fugle_daytrade_entry_history",
    reason: "loading",
    rows: [],
  };
  try {
    const response = await fetch(`/api/daytrade-entry-history?t=${Date.now()}`, { cache: "no-store" });
    daytradeEntryPayload = await response.json();
  } catch (error) {
    daytradeEntryPayload = {
      ok: false,
      source: "supabase:public.fugle_daytrade_entry_history",
      reason: "daytrade_entry_history_fetch_failed",
      error: error.message || String(error),
      rows: [],
    };
  }
  if (activeSupplement === "daytradeEntryPanel") render();
}

async function loadSevenStrategyDailyHistory() {
  sevenStrategyDailyHistoryPayload = {
    ok: false,
    sourceName: "seven_strategy_daily_history",
    source: "supabase:public.seven_strategy_daily_history",
    reason: "loading",
    rows: [],
  };
  try {
    const response = await fetch(`/api/seven-strategy-daily-history?limit=100&t=${Date.now()}`, { cache: "no-store" });
    sevenStrategyDailyHistoryPayload = await response.json();
  } catch (error) {
    sevenStrategyDailyHistoryPayload = {
      ok: false,
      sourceName: "seven_strategy_daily_history",
      source: "supabase:public.seven_strategy_daily_history",
      reason: "seven_strategy_daily_history_fetch_failed",
      error: error.message || String(error),
      rows: [],
    };
  }
  if (activeSupplement === "sevenStrategyDailyHistoryPanel") render();
}

byId("tabs").addEventListener("click", (event) => {
  const supplementButton = event.target.closest("[data-supplement]");
  if (supplementButton) {
    activeSupplement = supplementButton.dataset.supplement;
    activeStrategy = "全部";
    activeResult = "all";
    render();
    return;
  }
  const button = event.target.closest("[data-strategy]");
  if (!button) return;
  activeSupplement = "";
  activeStrategy = button.dataset.strategy;
  render();
});
byId("resultPills").addEventListener("click", (event) => {
  const button = event.target.closest("[data-result]");
  if (!button) return;
  activeResult = button.dataset.result;
  render();
});
byId("search").addEventListener("input", render);
byId("historyDate").addEventListener("change", (event) => {
  activeDate = event.target.value;
  activeStrategy = "全部";
  activeSupplement = "";
  activeResult = "all";
  load(activeDate);
});
byId("themeToggle").addEventListener("click", () => {
  applyTheme(document.body.dataset.theme === "sun" ? "night" : "sun");
});
byId("reload").addEventListener("click", () => {
  load(activeDate);
  loadStrategy4Live();
  loadDaytradeEntries();
  loadSevenStrategyDailyHistory();
});
applyTheme(preferredTheme());
load();
loadStrategy4Live();
loadDaytradeEntries();
loadSevenStrategyDailyHistory();
</script>
