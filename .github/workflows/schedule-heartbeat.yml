name: Schedule Heartbeat

on:
  schedule:
    # Taiwan trading days 07:02-22:57. This proves GitHub schedule itself is firing.
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 23 * * 0-4"
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 0-14 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: schedule-heartbeat
  cancel-in-progress: false

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Print schedule heartbeat
        run: |
          echo "schedule heartbeat ok"
          echo "event=${{ github.event_name }}"
          echo "utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          TZ=Asia/Taipei date +'%Y-%m-%d %H:%M:%S Asia/Taipei'
