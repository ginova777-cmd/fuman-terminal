name: Schedule Patrol - Emergency Only

on:
  # 緊急巡邏員：不是策略執行者，必要時才手動按 Run workflow。
  # 用途：檢查快取、API、其他 workflow 狀態；發現異常時寄信或補跑。
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: schedule-patrol
  cancel-in-progress: false

jobs:
  patrol:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Patrol workflows and caches
        run: node scripts/patrol-schedules.js
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          AUTO_DISPATCH_STALE: "1"
          REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
