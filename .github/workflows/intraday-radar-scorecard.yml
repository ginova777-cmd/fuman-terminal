name: Intraday Radar Scorecard

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "record or report"
        required: true
        default: "record"
        type: choice
        options:
          - record
          - report
      force_report:
        description: "force resend report even if today's report was already sent"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: intraday-radar-scorecard
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore private intraday signal cache
        uses: actions/cache/restore@v4
        with:
          path: .intraday-cache
          key: intraday-signals-${{ github.run_id }}
          restore-keys: |
            intraday-signals-
            intraday-radar-

      - name: Restore private report sent cache
        uses: actions/cache/restore@v4
        with:
          path: .intraday-report-cache
          key: intraday-report-sent-${{ github.run_id }}
          restore-keys: |
            intraday-report-sent-

      - name: Decide mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            HOUR="$(TZ=Asia/Taipei date +%H)"
            MIN="$(TZ=Asia/Taipei date +%M)"
            if { [ "$HOUR" -eq 14 ] && [ "$MIN" -ge 15 ]; } || { [ "$HOUR" -eq 15 ] && [ "$MIN" -le 15 ]; }; then
              echo "mode=report" >> "$GITHUB_OUTPUT"
              echo "report_slot=initial" >> "$GITHUB_OUTPUT"
            elif { [ "$HOUR" -eq 15 ] && [ "$MIN" -ge 30 ]; } || { [ "$HOUR" -eq 16 ] && [ "$MIN" -le 30 ]; }; then
              echo "mode=report" >> "$GITHUB_OUTPUT"
              echo "report_slot=final" >> "$GITHUB_OUTPUT"
            elif [ "$HOUR" -ge 9 ] && { [ "$HOUR" -lt 13 ] || { [ "$HOUR" -eq 13 ] && [ "$MIN" -le 30 ]; }; }; then
              echo "mode=record" >> "$GITHUB_OUTPUT"
            else
              echo "mode=skip" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Record intraday signals
        if: steps.mode.outputs.mode == 'record'
        run: node scripts/patrol-intraday-signals.js
        env:
          INTRADAY_PATROL_INTERVAL_MS: 3000

      - name: Publish strategy2 intraday report source
        if: steps.mode.outputs.mode == 'record'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add data/strategy2-intraday-latest.json
          git add data/strategy2-intraday-history
          git diff --cached --quiet || git commit -m "Update strategy2 intraday report source"
          git push

      - name: Send intraday report
        if: steps.mode.outputs.mode == 'report'
        run: node scripts/send-intraday-report.js
        env:
          REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          REPORT_SLOT: ${{ steps.mode.outputs.report_slot }}
          FORCE_REPORT: ${{ inputs.force_report == 'true' && '1' || '0' }}

      - name: Send failure alert
        if: failure()
        run: node scripts/send-workflow-alert.js
        env:
          REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          REPORT_SLOT: ${{ steps.mode.outputs.report_slot }}
          FORCE_REPORT: ${{ inputs.force_report == 'true' && '1' || '0' }}
          SCORECARD_MODE: ${{ steps.mode.outputs.mode }}
          GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Retry intraday report once
        if: failure() && steps.mode.outputs.mode == 'report'
        run: node scripts/send-intraday-report.js
        env:
          REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          REPORT_SLOT: ${{ steps.mode.outputs.report_slot }}

      - name: Save private intraday signal cache
        if: steps.mode.outputs.mode == 'record'
        uses: actions/cache/save@v4
        with:
          path: .intraday-cache
          key: intraday-signals-${{ github.run_id }}

      - name: Save private report sent cache
        if: steps.mode.outputs.mode == 'report'
        uses: actions/cache/save@v4
        with:
          path: .intraday-report-cache
          key: intraday-report-sent-${{ github.run_id }}
