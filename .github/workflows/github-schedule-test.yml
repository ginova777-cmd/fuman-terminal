name: GitHub Schedule Test

on:
  schedule:
    # Minimal always-on schedule probe. This must produce event=schedule.
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-schedule-test
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Print schedule proof
        run: |
          echo "github schedule test ok"
          echo "event=${{ github.event_name }}"
          echo "utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          TZ=Asia/Taipei date +'%Y-%m-%d %H:%M:%S Asia/Taipei'
