name: Schedule Wakeup Probe

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/schedule-wakeup-probe.yml"
  schedule:
    # Minimal GitHub-owned schedule probe. Must create event=schedule.
    - cron: "1,6,11,16,21,26,31,36,41,46,51,56 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: schedule-wakeup-probe
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Print proof
        run: |
          echo "schedule wakeup probe ok"
          echo "event=${{ github.event_name }}"
          echo "workflow=${{ github.workflow }}"
          echo "run_id=${{ github.run_id }}"
          echo "utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          TZ=Asia/Taipei date +'%Y-%m-%d %H:%M:%S Asia/Taipei'
