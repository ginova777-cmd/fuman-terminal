name: Strategy2 Intraday Snapshot

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: strategy2-intraday-snapshot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore intraday cache
        uses: actions/cache/restore@v4
        with:
          path: .intraday-cache
          key: strategy2-intraday-snapshot-${{ github.run_id }}
          restore-keys: |
            strategy2-intraday-snapshot-
            intraday-signals-
            intraday-radar-

      - name: Record one strategy2 snapshot
        run: node scripts/scan-intraday-signals.js

      - name: Publish strategy2 intraday files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add data/strategy2-intraday-latest.json
          git add data/strategy2-intraday-history
          git diff --cached --quiet || git commit -m "Update strategy2 intraday snapshot"
          git push

      - name: Save intraday cache
        uses: actions/cache/save@v4
        with:
          path: .intraday-cache
          key: strategy2-intraday-snapshot-${{ github.run_id }}
