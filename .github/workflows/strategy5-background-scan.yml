name: Strategy5 Fixed Scan

on:
  schedule:
    # Taiwan time 06:00 and 21:00 on trading days. Offset retries reduce GitHub schedule drops.
    - cron: "0,8,18,28,38,48,58 22-23 * * 0-4"
    - cron: "8,18,28,38,48,58 0 * * 1-5"
    - cron: "8,18,28,38,48,58 13-16 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: strategy5-background-cache
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync latest main
        run: git pull --rebase origin main

      - name: Decide retry need
        id: retry
        run: echo "mode=$(node scripts/should-run-scheduled-cache.js strategy5)" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}

      - name: Update strategy5 cache
        if: steps.retry.outputs.mode == 'run'
        run: |
          node scripts/scan-strategy5-cache.js
          node scripts/generate-slim-cache.js

      - name: Commit strategy5 cache
        if: steps.retry.outputs.mode == 'run'
        run: |
          git config user.name "fuman-terminal-bot"
          git config user.email "actions@github.com"
          git add \
            data/strategy5-latest.json \
            data/strategy5-backup.json \
            data/strategy-match-index.json \
            data/data-status-index.json \
            data/data-manifest.json \
            data/mobile-home-summary.json \
            data/terminal-home-bundle.json
          git diff --cached --quiet || git commit -m "Update strategy5 cache"
          git pull --rebase origin main
          git push
