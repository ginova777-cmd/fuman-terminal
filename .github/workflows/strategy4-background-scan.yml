name: Strategy Background Cache

on:
  workflow_dispatch:
    inputs:
      full_scan:
        description: "Use true for manual full market scan"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

concurrency:
  group: strategy-background-cache
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync latest main
        run: git pull --rebase origin main

      - name: Decide retry need
        id: retry
        run: echo "mode=$(node scripts/should-run-scheduled-cache.js strategy4)" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}

      - name: Update strategy caches
        if: steps.retry.outputs.mode == 'run'
        run: |
          node scripts/scan-strategy4-cache.js
        env:
          STRATEGY4_BATCH_SIZE: "80"
          STRATEGY4_BATCHES_PER_RUN: "999"
          FULL_SCAN: "1"

      - name: Verify strategy caches write
        if: steps.retry.outputs.mode == 'run'
        run: node scripts/verify-cache-write.js data/strategy4-latest.json

      - name: Commit cache
        if: steps.retry.outputs.mode == 'run'
        run: |
          git config user.name "fuman-terminal-bot"
          git config user.email "actions@github.com"
          git add data/strategy4-latest.json data/strategy4-backup.json
          git diff --cached --quiet || git commit -m "Update strategy caches"
          git pull --rebase --autostash origin main
          git push

