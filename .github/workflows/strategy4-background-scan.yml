name: Strategy Background Cache

on:
  schedule:
    # Taiwan time 21:00 on trading days.
    - cron: "0 13 * * 1-5"
    # Taiwan time 06:00 next morning, so the latest files are ready before market open.
    - cron: "0 22 * * 0-4"
  workflow_dispatch:
    inputs:
      full_scan:
        description: "Use true for manual full market scan"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

concurrency:
  group: strategy-background-cache
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update strategy caches
        run: |
          if [ ! -f scripts/scan-strategy4-cache.js ] && [ -f scan-strategy4-cache.js ]; then
            mkdir -p scripts
            cp scan-strategy4-cache.js scripts/scan-strategy4-cache.js
          fi
          if [ ! -f scripts/scan-warrant-flow-cache.js ] && [ -f scan-warrant-flow-cache.js ]; then
            mkdir -p scripts
            cp scan-warrant-flow-cache.js scripts/scan-warrant-flow-cache.js
          fi
          if [ ! -f scripts/scan-institution-cache.js ] && [ -f scan-institution-cache.js ]; then
            mkdir -p scripts
            cp scan-institution-cache.js scripts/scan-institution-cache.js
          fi
          node scripts/scan-strategy4-cache.js
          node scripts/scan-institution-cache.js
          node scripts/scan-warrant-flow-cache.js
        env:
          STRATEGY4_BATCH_SIZE: "48"
          STRATEGY4_BATCHES_PER_RUN: "5"
          FULL_SCAN: ${{ (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.full_scan == 'true')) && '1' || '0' }}

      - name: Commit cache
        run: |
          git config user.name "fuman-terminal-bot"
          git config user.email "actions@github.com"
          git add data/strategy4-latest.json data/strategy4-backup.json data/institution-latest.json data/institution-backup.json data/warrant-flow-latest.json data/warrant-flow-backup.json
          git diff --cached --quiet || git commit -m "Update strategy caches"
          git push
