name: Strategy Background Cache

on:
  schedule:
    - cron: "0 0,2,7 * * 1-5"
  workflow_dispatch:
    inputs:
      full_scan:
        description: "Use true for manual full market scan"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

concurrency:
  group: strategy-background-cache
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update strategy caches
        run: |
          if [ ! -f scripts/scan-strategy4-cache.js ] && [ -f scan-strategy4-cache.js ]; then
            mkdir -p scripts
            cp scan-strategy4-cache.js scripts/scan-strategy4-cache.js
          fi
          if [ ! -f scripts/scan-open-buy-cache.js ] && [ -f scan-open-buy-cache.js ]; then
            mkdir -p scripts
            cp scan-open-buy-cache.js scripts/scan-open-buy-cache.js
          fi
          if [ ! -f scripts/scan-warrant-flow-cache.js ] && [ -f scan-warrant-flow-cache.js ]; then
            mkdir -p scripts
            cp scan-warrant-flow-cache.js scripts/scan-warrant-flow-cache.js
          fi
          UTC_HOUR="$(date -u +%H)"
          RUN_OPEN_AND_WARRANT="0"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$UTC_HOUR" = "00" ] || [ "$UTC_HOUR" = "07" ]; then
            RUN_OPEN_AND_WARRANT="1"
          fi
          node scripts/scan-strategy4-cache.js
          if [ "$RUN_OPEN_AND_WARRANT" = "1" ]; then
            node scripts/scan-open-buy-cache.js
            node scripts/scan-warrant-flow-cache.js
          else
            echo "Skip open-buy and warrant-flow at Taiwan 10:00; strategy4 only."
          fi
        env:
          STRATEGY4_BATCH_SIZE: "48"
          STRATEGY4_BATCHES_PER_RUN: "5"
          OPEN_BUY_BATCH_SIZE: "48"
          OPEN_BUY_BATCHES_PER_RUN: "5"
          FULL_SCAN: ${{ (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.full_scan == 'true')) && '1' || '0' }}

      - name: Commit cache
        run: |
          git config user.name "fuman-terminal-bot"
          git config user.email "actions@github.com"
          git add data/strategy4-latest.json data/strategy4-backup.json data/open-buy-latest.json data/open-buy-backup.json data/warrant-flow-latest.json data/warrant-flow-backup.json
          git diff --cached --quiet || git commit -m "Update strategy caches"
          git push
