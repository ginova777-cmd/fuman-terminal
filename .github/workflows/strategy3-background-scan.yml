name: Strategy3 Overnight Cache

on:
  schedule:
    # Taipei 13:00-13:40 Mon-Fri. Later attempts skip automatically once today's cache is fresh.
    - cron: "0,10,20,30,40 5 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: strategy3-background-cache
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Decide retry need
        id: retry
        run: echo "mode=$(node scripts/should-run-scheduled-cache.js strategy3)" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}

      - name: Update strategy3 cache
        if: steps.retry.outputs.mode == 'run'
        run: |
          node scripts/scan-strategy3-cache.js

      - name: Verify strategy3 cache write
        if: steps.retry.outputs.mode == 'run'
        run: node scripts/verify-cache-write.js data/strategy3-latest.json

      - name: Commit strategy3 cache
        if: steps.retry.outputs.mode == 'run'
        run: |
          git config user.name "fuman-terminal-bot"
          git config user.email "actions@github.com"
          git add data/strategy3-latest.json data/strategy3-backup.json data/strategy3-scorecard-source.json
          if git diff --cached --quiet; then
            echo "strategy3 cache unchanged"
            exit 0
          fi
          git commit -m "Update strategy3 cache"
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            git rebase --abort || true
            sleep $((attempt * 5))
          done
          echo "strategy3 cache push failed after retries"
          exit 1
