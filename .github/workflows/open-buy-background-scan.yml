name: Open Buy Background Scan

on:
  schedule:
    # Taiwan time 07:00 on trading days. Retry every 5 minutes until cache is updated.
    - cron: "*/5 23 * * 0-4"
    # Taiwan time 14:30 on trading days. Retry every 5 minutes until cache is updated.
    - cron: "30,35,40,45,50,55 6 * * 1-5"
    - cron: "*/5 7 * * 1-5"
  workflow_dispatch:
    inputs:
      full_scan:
        description: "Use true for manual full market scan"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

concurrency:
  group: open-buy-background-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync latest main
        run: git pull --rebase origin main

      - name: Decide retry need
        id: retry
        run: echo "mode=$(node scripts/should-run-scheduled-cache.js openBuy)" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}

      - name: Run open buy scan
        if: steps.retry.outputs.mode == 'run'
        run: node scripts/scan-open-buy-cache.js
        env:
          OPEN_BUY_BATCH_SIZE: "48"
          OPEN_BUY_BATCHES_PER_RUN: "5"
          FULL_SCAN: ${{ (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.full_scan == 'true')) && '1' || '0' }}

      - name: Verify open buy cache write
        if: steps.retry.outputs.mode == 'run'
        run: node scripts/verify-cache-write.js data/open-buy-latest.json

      - name: Commit open buy cache
        if: steps.retry.outputs.mode == 'run'
        run: |
          git config user.name "fuman-terminal-bot"
          git config user.email "actions@github.com"
          git add data/open-buy-latest.json data/open-buy-backup.json
          if [ -f data/open-buy-scorecard-source.json ]; then
            git add data/open-buy-scorecard-source.json
          fi
          git diff --cached --quiet || git commit -m "Update open buy cache"
          git pull --rebase origin main
          git push
