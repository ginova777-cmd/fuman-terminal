name: Fuman Master Schedule

on:
  schedule:
    # Single GitHub-owned schedule entrypoint for the whole terminal.
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      force_tasks:
        description: "Optional comma list: patrol,openBuy,strategy3,strategy4,strategy5,flow,intradayRecord,intradayReport"
        required: false
        default: ""

permissions:
  contents: read
  actions: write

concurrency:
  group: fuman-master-schedule
  cancel-in-progress: false

jobs:
  master:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Dispatch due terminal schedules
        run: node scripts/fuman-master-schedule.js
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          MASTER_FORCE_TASKS: ${{ inputs.force_tasks }}
