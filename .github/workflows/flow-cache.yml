name: Flow And Institution Cache

on:
  schedule:
    # Taiwan time 06:00 and 21:00 on trading days. Retry every 10 minutes until cache is updated.
    - cron: "*/10 22-23 * * 0-4"
    - cron: "*/10 0-14 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: flow-institution-cache
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Decide retry need
        id: retry
        run: echo "mode=$(node scripts/should-run-scheduled-cache.js flow)" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}

      - name: Update buy-sell and warrant-flow cache
        if: steps.retry.outputs.mode == 'run'
        run: |
          retry() {
            label="$1"
            shift
            for attempt in 1 2 3; do
              echo "$label attempt $attempt"
              if "$@"; then
                echo "$label succeeded"
                return 0
              fi
              echo "$label failed"
              if [ "$attempt" -lt 3 ]; then
                sleep 30
              fi
            done
            return 1
          }
          retry "institution cache" node scripts/scan-institution-cache.js
          retry "warrant-flow cache" node scripts/scan-warrant-flow-cache.js

      - name: Commit cache
        if: steps.retry.outputs.mode == 'run'
        run: |
          git config user.name "fuman-terminal-bot"
          git config user.email "actions@github.com"
          git add data/institution-latest.json data/institution-backup.json data/warrant-flow-latest.json data/warrant-flow-backup.json
          git diff --cached --quiet || git commit -m "Update flow and institution cache"
          git pull --rebase origin main
          git push
